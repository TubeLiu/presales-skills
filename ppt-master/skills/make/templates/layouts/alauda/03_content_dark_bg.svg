<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Template: Dark Background Content Page - Alauda Style -->

    <defs>
        <linearGradient id="darkBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1B6D93"/>
            <stop offset="50%" stop-color="#125B7D"/>
            <stop offset="100%" stop-color="#14B8A6"/>
        </linearGradient>
    </defs>

    <!-- Gradient background -->
    <rect width="1280" height="720" fill="url(#darkBgGrad)"/>

    <!-- Background decorations (approximated from master EMF) -->
    <circle cx="1350" cy="600" r="280" fill="#FFFFFF" fill-opacity="0.03"/>
    <circle cx="1400" cy="250" r="220" fill="#FFFFFF" fill-opacity="0.02"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#FFFFFF" fill-opacity="0.015"/>

    <!-- Left edge accent bar (PPTX: pos 0,29 size 22x45) -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>


    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" font-weight="bold" fill="#FFFFFF">
        {{PAGE_TITLE}}
    </text>

    <!-- Content area placeholder -->
    <text x="640" y="390" text-anchor="middle" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.3">
        {{CONTENT_AREA}}
    </text>

    <!-- Footer line -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.1"/>

    <!-- Footer -->
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.4" letter-spacing="1">
        Alauda
    </text>
    <text x="1220" y="706" text-anchor="end" font-family="Aptos, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.4">
        {{PAGE_NUM}}
    </text>

</svg>

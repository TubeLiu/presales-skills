<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Content Variant: Three-Card Differentiation - Alauda Style -->
    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Background decorations (approximated from master EMF) -->
    <circle cx="1350" cy="600" r="280" fill="#3BAEE3" fill-opacity="0.04"/>
    <circle cx="1400" cy="250" r="220" fill="#3BAEE3" fill-opacity="0.03"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#3BAEE3" fill-opacity="0.02"/>

    <!-- Left edge accent bar (PPTX: pos 0,29 size 22x45) -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>

    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" font-weight="bold" fill="#334155">
        {{PAGE_TITLE}}
    </text>
    <!-- Card 1 -->
    <rect x="60" y="120" width="360" height="520" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="60" y="120" width="360" height="6" fill="#3BAEE3" rx="3"/>
    <text x="90" y="175" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="40" font-weight="bold" fill="#3BAEE3" fill-opacity="0.2">01</text>
    <text x="150" y="175" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="bold" fill="#334155">
        {{CARD_1_TITLE}}
    </text>
    <text x="90" y="210" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#475569">
        {{CARD_1_DESC}}
    </text>

    <!-- Card 2 -->
    <rect x="460" y="120" width="360" height="520" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="460" y="120" width="360" height="6" fill="#14B8A6" rx="3"/>
    <text x="490" y="175" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="40" font-weight="bold" fill="#14B8A6" fill-opacity="0.2">02</text>
    <text x="550" y="175" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="bold" fill="#334155">
        {{CARD_2_TITLE}}
    </text>
    <text x="490" y="210" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#475569">
        {{CARD_2_DESC}}
    </text>

    <!-- Card 3 -->
    <rect x="860" y="120" width="360" height="520" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="860" y="120" width="360" height="6" fill="#125B7D" rx="3"/>
    <text x="890" y="175" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="40" font-weight="bold" fill="#125B7D" fill-opacity="0.2">03</text>
    <text x="950" y="175" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="bold" fill="#334155">
        {{CARD_3_TITLE}}
    </text>
    <text x="890" y="210" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#475569">
        {{CARD_3_DESC}}
    </text>

    <!-- Footer line -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">Alauda</text>
    <text x="1220" y="706" text-anchor="end" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8">{{PAGE_NUM}}</text>

</svg>

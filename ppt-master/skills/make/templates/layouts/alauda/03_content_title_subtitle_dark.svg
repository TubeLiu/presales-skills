<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Template: Content Title + Subtitle (Dark) - Alauda Style -->

    <!-- Dark navy background -->
    <rect width="1280" height="720" fill="#0F2B46"/>

    <!-- Background decorations -->
    <circle cx="1350" cy="600" r="280" fill="#FFFFFF" fill-opacity="0.03"/>
    <circle cx="1400" cy="250" r="220" fill="#FFFFFF" fill-opacity="0.02"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#FFFFFF" fill-opacity="0.015"/>

    <!-- Left edge accent bar -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>

    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" fill="#FFFFFF">
        {{PAGE_TITLE}}
    </text>

    <!-- Subtitle (16pt = 21px) -->
    <text x="32" y="95" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="21" fill="#FFFFFF" fill-opacity="0.7">
        {{PAGE_SUBTITLE}}
    </text>

    <!-- Content area placeholder -->
    <text x="640" y="400" text-anchor="middle" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.3">
        {{CONTENT_AREA}}
    </text>

    <!-- Footer -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.1"/>
    <text x="22" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.4">{{PAGE_NUM}}</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- Template: Cover Page (Dark) - Alauda Style -->

    <!-- Solid Dark Navy background -->
    <rect width="1280" height="720" fill="#0F2B46"/>

    <!-- Logo -->
    <image x="60" y="50" width="150" height="46" href="alauda_logo.png" preserveAspectRatio="xMidYMid meet"/>

    <!-- Main title -->
    <text x="60" y="280" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF" letter-spacing="-0.5">
        {{TITLE}}
    </text>

    <!-- Subtitle -->
    <text x="60" y="340" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.85">
        {{SUBTITLE}}
    </text>

    <!-- Divider line -->
    <line x1="60" y1="380" x2="400" y2="380" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.3"/>

    <!-- Author / Organization -->
    <text x="60" y="460" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" fill="#FFFFFF">
        {{AUTHOR}}
    </text>

    <!-- Date -->
    <text x="60" y="490" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.75">
        {{DATE}}
    </text>

    <!-- Footer -->
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="1">
        Alauda
    </text>

</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Content Variant: Before / After Comparison - Alauda Style -->
    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Background decorations (approximated from master EMF) -->
    <circle cx="1350" cy="600" r="280" fill="#3BAEE3" fill-opacity="0.04"/>
    <circle cx="1400" cy="250" r="220" fill="#3BAEE3" fill-opacity="0.03"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#3BAEE3" fill-opacity="0.02"/>

    <!-- Left edge accent bar (PPTX: pos 0,29 size 22x45) -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>

    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" font-weight="bold" fill="#334155">
        {{PAGE_TITLE}}
    </text>
    <!-- Key message -->
    <text x="32" y="95" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="21" fill="#334155">
        {{KEY_MESSAGE}}
    </text>

    <!-- BEFORE panel -->
    <rect x="60" y="130" width="560" height="520" fill="#FEF2F2" rx="8" stroke="#FECACA" stroke-width="1"/>
    <rect x="60" y="130" width="560" height="44" fill="#FE574C" rx="8"/>
    <rect x="60" y="152" width="560" height="22" fill="#FE574C"/>
    <text x="90" y="160" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" letter-spacing="2">BEFORE</text>
    <text x="90" y="208" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" font-weight="bold" fill="#334155">
        {{BEFORE_TITLE}}
    </text>
    <text x="90" y="240" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#475569">
        {{BEFORE_DESC}}
    </text>

    <!-- Center arrow -->
    <polygon points="635,390 655,375 655,385 680,385 680,395 655,395 655,405" fill="#3BAEE3"/>

    <!-- AFTER panel -->
    <rect x="660" y="130" width="560" height="520" fill="#F0FDF4" rx="8" stroke="#BBF7D0" stroke-width="1"/>
    <rect x="660" y="130" width="560" height="44" fill="#25B273" rx="8"/>
    <rect x="660" y="152" width="560" height="22" fill="#25B273"/>
    <text x="690" y="160" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" letter-spacing="2">AFTER</text>
    <text x="690" y="208" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="18" font-weight="bold" fill="#334155">
        {{AFTER_TITLE}}
    </text>
    <text x="690" y="240" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#475569">
        {{AFTER_DESC}}
    </text>

    <!-- Footer line -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">Alauda</text>
    <text x="1220" y="706" text-anchor="end" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8">{{PAGE_NUM}}</text>

</svg>

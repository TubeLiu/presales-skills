<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Content Variant: Full-Width Screenshot - Alauda Style (Slide 9) -->
    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Background decorations (approximated from master EMF) -->
    <circle cx="1350" cy="600" r="280" fill="#3BAEE3" fill-opacity="0.04"/>
    <circle cx="1400" cy="250" r="220" fill="#3BAEE3" fill-opacity="0.03"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#3BAEE3" fill-opacity="0.02"/>

    <!-- Left edge accent bar (PPTX: pos 0,29 size 22x45) -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>

    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" font-weight="bold" fill="#334155">
        {{PAGE_TITLE}}
    </text>
    <!-- Key message -->
    <text x="32" y="95" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="21" fill="#334155">
        {{KEY_MESSAGE}}
    </text>

    <!-- Full-width screenshot container -->
    <rect x="60" y="130" width="1160" height="480" fill="#F1F5F9" rx="8" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Browser chrome mockup -->
    <rect x="60" y="130" width="1160" height="32" fill="#E2E8F0" rx="8"/>
    <rect x="60" y="150" width="1160" height="12" fill="#E2E8F0"/>
    <circle cx="84" cy="146" r="5" fill="#FE574C"/>
    <circle cx="100" cy="146" r="5" fill="#FFC832"/>
    <circle cx="116" cy="146" r="5" fill="#25B273"/>

    <!-- Screenshot placeholder -->
    <text x="640" y="385" text-anchor="middle" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="18" fill="#94A3B8">
        {{SCREENSHOT_CONTENT}}
    </text>

    <!-- Caption bar -->
    <rect x="60" y="625" width="1160" height="40" fill="#F8FAFC" rx="6" stroke="#E2E8F0" stroke-width="1"/>
    <text x="640" y="651" text-anchor="middle" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="14" fill="#475569">
        {{SCREENSHOT_CAPTION}}
    </text>

    <!-- Footer line -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">Alauda</text>
    <text x="1220" y="706" text-anchor="end" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8">{{PAGE_NUM}}</text>

</svg>

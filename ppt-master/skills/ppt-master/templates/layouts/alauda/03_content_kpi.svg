<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Content Variant: KPI Metric Cards - Alauda Style -->
    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Background decorations (approximated from master EMF) -->
    <circle cx="1350" cy="600" r="280" fill="#3BAEE3" fill-opacity="0.04"/>
    <circle cx="1400" cy="250" r="220" fill="#3BAEE3" fill-opacity="0.03"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#3BAEE3" fill-opacity="0.02"/>

    <!-- Left edge accent bar (PPTX: pos 0,29 size 22x45) -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>

    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" font-weight="bold" fill="#334155">
        {{PAGE_TITLE}}
    </text>
    <!-- Key message -->
    <text x="32" y="95" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="21" fill="#334155">
        {{KEY_MESSAGE}}
    </text>

    <!-- KPI Card 1 -->
    <rect x="60" y="140" width="270" height="200" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="60" y="140" width="4" height="200" fill="#3BAEE3" rx="2"/>
    <text x="88" y="210" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="48" font-weight="bold" fill="#3BAEE3">
        {{KPI_1_VALUE}}
    </text>
    <text x="88" y="245" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{KPI_1_LABEL}}
    </text>
    <text x="88" y="270" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#94A3B8">
        {{KPI_1_DESC}}
    </text>

    <!-- KPI Card 2 -->
    <rect x="360" y="140" width="270" height="200" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="360" y="140" width="4" height="200" fill="#14B8A6" rx="2"/>
    <text x="388" y="210" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="48" font-weight="bold" fill="#14B8A6">
        {{KPI_2_VALUE}}
    </text>
    <text x="388" y="245" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{KPI_2_LABEL}}
    </text>
    <text x="388" y="270" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#94A3B8">
        {{KPI_2_DESC}}
    </text>

    <!-- KPI Card 3 -->
    <rect x="660" y="140" width="270" height="200" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="660" y="140" width="4" height="200" fill="#25B273" rx="2"/>
    <text x="688" y="210" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="48" font-weight="bold" fill="#25B273">
        {{KPI_3_VALUE}}
    </text>
    <text x="688" y="245" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{KPI_3_LABEL}}
    </text>
    <text x="688" y="270" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#94A3B8">
        {{KPI_3_DESC}}
    </text>

    <!-- KPI Card 4 -->
    <rect x="960" y="140" width="260" height="200" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="960" y="140" width="4" height="200" fill="#125B7D" rx="2"/>
    <text x="988" y="210" font-family="&quot;Aptos Display&quot;, sans-serif" font-size="48" font-weight="bold" fill="#125B7D">
        {{KPI_4_VALUE}}
    </text>
    <text x="988" y="245" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{KPI_4_LABEL}}
    </text>
    <text x="988" y="270" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#94A3B8">
        {{KPI_4_DESC}}
    </text>

    <!-- Detail area below KPI cards -->
    <rect x="60" y="370" width="1160" height="280" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>
    <text x="640" y="510" text-anchor="middle" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="16" fill="#CBD5E1">
        {{CONTENT_AREA}}
    </text>

    <!-- Footer line -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">Alauda</text>
    <text x="1220" y="706" text-anchor="end" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8">{{PAGE_NUM}}</text>

</svg>

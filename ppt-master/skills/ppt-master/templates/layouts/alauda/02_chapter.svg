<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
    <!-- Template: Chapter Page - Alauda Style -->

    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Background decorations -->
    <circle cx="1350" cy="600" r="280" fill="#3BAEE3" fill-opacity="0.04"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#3BAEE3" fill-opacity="0.02"/>

    <!-- Building glass photo (PPTX: pos 55,47 size 417x625) -->
    <image x="55" y="47" width="417" height="625" href="building_glass.png" preserveAspectRatio="xMidYMid slice"/>

    <!-- Chapter number (PPTX: pos 655,160, 96pt bold, accent5=#FE574C) -->
    <text x="655" y="290" font-family="Arial, &quot;Aptos Display&quot;, sans-serif" font-size="128" font-weight="bold" fill="#FE574C">
        {{CHAPTER_NUM}}
    </text>

    <!-- PART label (PPTX: pos 818,254, 20pt bold, tx1=#334155, no background) -->
    <text x="818" y="270" font-family="Arial, &quot;Aptos Display&quot;, sans-serif" font-size="27" font-weight="bold" fill="#334155" letter-spacing="2">
        PART
    </text>

    <!-- Chapter title (PPTX: pos 655,329, 60pt bold, Microsoft YaHei UI) -->
    <text x="655" y="400" font-family="&quot;Microsoft YaHei UI&quot;, &quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="80" font-weight="bold" fill="#334155">
        {{CHAPTER_TITLE}}
    </text>

    <!-- Chapter description (PPTX: pos 655,461, 14pt) -->
    <text x="655" y="510" font-family="Arial, &quot;PingFang SC&quot;, sans-serif" font-size="19" fill="#94A3B8">
        {{CHAPTER_DESC}}
    </text>

    <!-- Footer -->
    <line x1="472" y1="682" x2="1280" y2="682" stroke="#E2E8F0" stroke-width="1"/>
    <text x="655" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">Alauda</text>
</svg>

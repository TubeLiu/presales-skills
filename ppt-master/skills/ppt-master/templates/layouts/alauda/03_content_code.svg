<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Content Variant: Code + Notes - Alauda Style (Slide 20) -->
    <!-- White background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Background decorations (approximated from master EMF) -->
    <circle cx="1350" cy="600" r="280" fill="#3BAEE3" fill-opacity="0.04"/>
    <circle cx="1400" cy="250" r="220" fill="#3BAEE3" fill-opacity="0.03"/>
    <ellipse cx="1150" cy="780" rx="350" ry="130" fill="#3BAEE3" fill-opacity="0.02"/>

    <!-- Left edge accent bar (PPTX: pos 0,29 size 22x45) -->
    <rect x="0" y="29" width="22" height="45" fill="#3BAEE3"/>

    <!-- Page title -->
    <text x="46" y="55" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="37" font-weight="bold" fill="#334155">
        {{PAGE_TITLE}}
    </text>
    <!-- Left: Code block -->
    <rect x="60" y="100" width="700" height="550" fill="#1E293B" rx="8"/>

    <!-- Code block title bar -->
    <rect x="60" y="100" width="700" height="36" fill="#334155" rx="8"/>
    <rect x="60" y="124" width="700" height="12" fill="#334155"/>
    <circle cx="84" cy="118" r="5" fill="#FE574C"/>
    <circle cx="100" cy="118" r="5" fill="#FFC832"/>
    <circle cx="116" cy="118" r="5" fill="#25B273"/>
    <text x="400" y="123" text-anchor="middle" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8">
        {{CODE_FILENAME}}
    </text>

    <!-- Code content placeholder -->
    <text x="88" y="170" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#E2E8F0">
        {{CODE_CONTENT}}
    </text>

    <!-- Right: Notes panel -->
    <rect x="790" y="100" width="430" height="550" fill="#F8FAFC" rx="8" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Notes header -->
    <rect x="810" y="120" width="100" height="28" fill="#D8EFF9" rx="4"/>
    <text x="860" y="139" text-anchor="middle" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="12" font-weight="bold" fill="#125B7D">
        {{NOTES_LABEL}}
    </text>

    <!-- Notes section 1 -->
    <rect x="810" y="170" width="390" height="4" fill="#3BAEE3" rx="2"/>
    <text x="810" y="200" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{NOTE_1_TITLE}}
    </text>
    <text x="810" y="225" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#475569">
        {{NOTE_1_DESC}}
    </text>

    <!-- Notes section 2 -->
    <rect x="810" y="320" width="390" height="4" fill="#14B8A6" rx="2"/>
    <text x="810" y="350" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{NOTE_2_TITLE}}
    </text>
    <text x="810" y="375" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#475569">
        {{NOTE_2_DESC}}
    </text>

    <!-- Notes section 3 -->
    <rect x="810" y="470" width="390" height="4" fill="#125B7D" rx="2"/>
    <text x="810" y="500" font-family="&quot;Aptos Display&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="bold" fill="#334155">
        {{NOTE_3_TITLE}}
    </text>
    <text x="810" y="525" font-family="Aptos, &quot;PingFang SC&quot;, sans-serif" font-size="13" fill="#475569">
        {{NOTE_3_DESC}}
    </text>

    <!-- Footer line -->
    <line x1="0" y1="682" x2="1280" y2="682" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="706" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">Alauda</text>
    <text x="1220" y="706" text-anchor="end" font-family="Aptos, sans-serif" font-size="12" fill="#94A3B8">{{PAGE_NUM}}</text>

</svg>

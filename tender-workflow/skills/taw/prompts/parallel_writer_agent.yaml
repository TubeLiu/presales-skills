# 并行写作子智能体调度配置（Parallel Writer Dispatch Config）
# v2.0.0 | Phase 2B dispatch 调度层
#
# v2.0.0 重大变更：
# - 完整 prompt template 已迁移到 agents/writer.md（主 session 通过 Task
#   tool 投递，对齐 solution-master 形态）
# - 本文件降级为 dispatch 调度配置：context 打包规则 + 执行检查 + 全局规则
# - subagent 输出格式约束（### {h3_title} 不写编号 + 必须嵌图）已在
#   agents/writer.md 中强约束

name: parallel_writer_dispatch
version: "2.0.0"
description: |
  并行写作模式 Phase 2B 的 dispatch 调度配置。
  主 session 按 context_packaging 准备每个 H3 的素材，按
  agents/writer.md 模板填占位符并通过 Task tool 并发分发。

agent_prompt_source: agents/writer.md  # 真正的 prompt 模板位置

# ============================================================
# 上下文打包规则
# ============================================================

context_packaging:
  # 必须传递给每个子智能体的上下文
  required:
    - name: writing_brief_core
      description: "论述主线 + 术语表（从 Writing Brief 提取）"
      max_tokens: 500
      source: "Phase 2A Writing Brief"

    - name: h3_task_definition
      description: "当前 H3 的任务定义（核心论点、评分项、字数、衔接指令）"
      max_tokens: 200
      source: "Writing Brief h3_assignment_table 对应行"

    - name: scoring_points_detail
      description: "需覆盖的 M4 评分项完整描述"
      max_tokens: 500
      source: "M4 评分标准，按 h3_assignment_table.scoring_points 筛选"

    - name: kb_materials_content
      description: "该 H3 对应的知识库检索结果"
      max_tokens: 1500
      source: "Phase 1.3 KB 结果，按 h3_assignment_table.kb_materials 筛选"

    - name: web_facts_content
      description: "该 H3 适用的 WEB_FACTS 条目"
      max_tokens: 500
      source: "Phase 1.3 WEB_FACTS，按 h3_assignment_table.web_facts 筛选"

    - name: global_writing_rules
      description: "全局写作规则精简版"
      max_tokens: 300
      source: "article_core.yaml global_rules 精简提取"

    - name: image_plan
      description: "该 H3 的图片分配数组：每项 {path: abs, caption: '图 X-Y ...', placement_hint: '开头/中段/末尾'}；空数组 [] 表示无图"
      max_tokens: 300
      source: "Writing Brief h3_assignment_table.image_plan 列"
      note: "subagent 必须按 placement_hint 把每项嵌成 ![caption](path)，文件不存在时由 docx_writer 自动降级占位符"

  # 不传递给子智能体（节省 token）
  excluded:
    - "完整分析报告原文（M1-M7 全文）"
    - "其他 H3 子节的 KB 检索结果"
    - "Phase 0/1 的执行日志"
    - "图片获取相关指令和配额信息"
    - "DOCX 格式化代码模板"
    - "完整的 h3_assignment_table（只传当前行）"

  # 预估每个子智能体总上下文
  estimated_total: "4-6KB / 1500-2500 tokens"

# ============================================================
# Phase 2B 执行与结果检查
# ============================================================

phase_2b_execution:
  dispatch_rule: |
    主 session 在单条消息中并发分发所有 H3 子智能体：
    对 h3_assignment_table 中的每个 H3：
      1. Read $SKILL_DIR/agents/writer.md 获取 prompt 模板
      2. 按 context_packaging.required 准备占位符值
      3. 用占位符填充模板得到完整 prompt
      4. Task(description="撰写子节 {h3_numbering} {h3_title}", prompt=...)
    ⚠️ 所有 Task 调用必须在同一条消息中发出，确保并发执行。

  result_checking:
    - check: "子 agent 超时"
      condition: "无返回结果"
      action: "重试一次，同样参数"
    - check: "首行非 ###"
      condition: "regex `^#{1,2}\\s+` 命中（即 # 或 ##）"
      action: "立即重派一次，prompt 强调'禁止使用 # 或 ##'"
    - check: "标题含编号 prefix"
      condition: "regex `^### \\d+(\\.\\d+)+\\s+` 命中（如 '### 1.2.1 ...'）"
      action: "立即重派一次，prompt 强调'禁止在标题文本里写编号'"
    - check: "字数不足"
      condition: "输出 < 目标字数 × 50%"
      action: "标记给 Phase 2C 补充扩展"
    - check: "术语违规"
      condition: "使用了禁用变体"
      action: "标记给 Phase 2C 统一替换（无需重试）"
    - check: "内容跑题"
      condition: "未覆盖 core_argument"
      action: "重试，prompt 强调核心论点"
    - check: "图片缺失"
      condition: "image_plan 中某项 path 在输出 Markdown 中找不到对应 ![]() 引用"
      action: "Phase 2C 补嵌（按 placement_hint 插在末尾）"
    - check: "多数失败"
      condition: ">50% 子 agent 失败"
      action: "降级到顺序写作模式（回退执行 Step 3）"

  degradation_message: "⚠️ 并行写作模式失败（{失败数}/{总数} 子节未完成），降级到顺序写作模式"

# ============================================================
# 全局写作规则精简版（从 article_core.yaml 提取）
# ============================================================

global_writing_rules_template: |
  1. **评分导向**：高分值评分项（≥10分）重点展开，低分值项（<5分）简明响应
  2. **数据支撑**：用量化数据支撑论述（性能指标、案例规模、认证数量）
  3. **结构化表达**：每个功能/方案按"需求响应→方案设计→实现路径→预期效果"展开
  4. **差异化突出**：在对应位置突出厂商差异化优势
  5. **红线规避**：不得违反废标条款和风险红线
  6. **篇幅要求**：
     - 三级子节（X.X.X）不少于 {word_override_3} 字
     - 四级子节（X.X.X.X）不少于 {word_override_4} 字
     - 五级子节（X.X.X.X.X）不少于 {word_override_5} 字
  7. **表格优先**：技术要求响应、功能对比、里程碑计划等用表格呈现
  8. **中文排版**：中英文间加空格，数字与中文间加空格

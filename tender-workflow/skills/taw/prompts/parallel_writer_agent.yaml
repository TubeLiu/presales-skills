# 并行写作子智能体调度配置（Parallel Writer Dispatch Config）
# v2.0.0 | Phase 2B dispatch 调度层
#
# v2.0.0 重大变更：
# - 完整 prompt template 已迁移到 agents/writer.md（主 session 通过 Task
#   tool 投递，对齐 solution-master 形态）
# - 本文件降级为 dispatch 调度配置：context 打包规则 + 执行检查 + 全局规则
# - subagent 输出格式约束（### {h3_title} 不写编号 + 必须嵌图）已在
#   agents/writer.md 中强约束

name: parallel_writer_dispatch
version: "2.0.0"
description: |
  并行写作模式 Phase 2B 的 dispatch 调度配置。
  主 session 按 context_packaging 准备每个 H3 的素材，按
  agents/writer.md 模板填占位符并通过 Task tool 并发分发。

agent_prompt_source: agents/writer.md  # 真正的 prompt 模板位置

# ============================================================
# 上下文打包规则
# ============================================================

context_packaging:
  # 必须传递给每个子智能体的上下文。占位符名称与 agents/writer.md 的 {xxx}
  # 一一对应；主 session 用本表填模板。
  required:
    # ── 章节 / 子节身份 ──
    - name: chapter_title
      description: "章节标题（H2 标题文本，不含编号）"
      max_tokens: 30
      source: "OUTLINE_SUBSECTIONS 当前章节 title"
    - name: h3_numbering
      description: "本子节编号（如 '1.3.1'）— 仅用于 Task description 与上下文识别，**不写入** subagent 输出标题"
      max_tokens: 10
      source: "h3_assignment_table.h3_numbering"
    - name: h3_title
      description: "本子节标题文本（不含编号）— subagent 输出首行 ### 起跳"
      max_tokens: 30
      source: "h3_assignment_table.h3_title"
    - name: h3_index
      description: "本子节序号（1-based，如 '2'）— 给 subagent 上下文位置感"
      max_tokens: 5
      source: "枚举 h3_assignment_table"
    - name: h3_total
      description: "全章 H3 总数（如 '5'）"
      max_tokens: 5
      source: "len(h3_assignment_table)"
    - name: connect_from
      description: "承接上一节内容的一句话（首个 H3 固定 '章节引言'）"
      max_tokens: 50
      source: "h3_assignment_table[i].connect_from"
    - name: lead_to
      description: "为下一节铺垫的一句话（末个 H3 固定 '章节总结'）"
      max_tokens: 50
      source: "h3_assignment_table[i].lead_to"

    # ── 写作蓝图（全章共享）──
    - name: argument_thread
      description: "全章论述主线（3-5 句话概括递进关系）"
      max_tokens: 200
      source: "Writing Brief argument_thread"
    - name: terminology_table
      description: "全章术语规范表（统一用语 / 禁用变体 / 使用场景）"
      max_tokens: 400
      source: "Writing Brief terminology_table"

    # ── 本子节任务 ──
    - name: core_argument
      description: "本子节核心论点（1 句话）"
      max_tokens: 50
      source: "h3_assignment_table[i].core_argument"
    - name: target_words
      description: "本子节目标字数"
      max_tokens: 5
      source: "h3_assignment_table[i].target_words"
    - name: scoring_points_detail
      description: "需覆盖的 M4 评分项完整描述"
      max_tokens: 500
      source: "M4 评分标准，按 h3_assignment_table[i].scoring_points 筛选"

    # ── 素材 ──
    - name: kb_materials_content
      description: "该 H3 对应的知识库检索结果"
      max_tokens: 1500
      source: "Phase 1.3 KB 结果，按 h3_assignment_table[i].kb_materials 筛选"
    - name: web_facts_content
      description: "该 H3 适用的 WEB_FACTS 条目"
      max_tokens: 500
      source: "Phase 1.3 WEB_FACTS，按 h3_assignment_table[i].web_facts 筛选"
    - name: image_plan
      description: "该 H3 的图片分配数组：每项 {path: abs, caption: '图 X-Y ...', placement_hint: '开头/中段/末尾'}；空数组 [] 表示无图"
      max_tokens: 300
      source: "Writing Brief h3_assignment_table[i].image_plan 列"
      note: "subagent 必须按 placement_hint 把每项嵌成 ![caption](path)，文件不存在时由 docx_writer 自动降级占位符"

    # ── 全局规则 ──
    - name: global_writing_rules
      description: "全局写作规则精简版（评分导向 / 数据支撑 / 结构化表达 / 差异化 / 红线 / 字数 / 表格 / 中文排版）"
      max_tokens: 300
      source: "本 yaml 末 global_writing_rules_template 渲染"

  # 不传递给子智能体（节省 token）
  excluded:
    - "完整分析报告原文（M1-M7 全文）"
    - "其他 H3 子节的 KB 检索结果"
    - "Phase 0/1 的执行日志"
    - "图片获取相关指令和配额信息"
    - "DOCX 格式化代码模板"
    - "完整的 h3_assignment_table（只传当前行）"

  # 预估每个子智能体总上下文
  estimated_total: "4-6KB / 1500-2500 tokens"

# ============================================================
# Phase 2B 执行与结果检查
# ============================================================

phase_2b_execution:
  dispatch_rule: |
    主 session 在单条消息中并发分发所有 H3 子智能体：
    对 h3_assignment_table 中的每个 H3：
      1. Read $SKILL_DIR/agents/writer.md 获取 prompt 模板
      2. 按 context_packaging.required 准备占位符值
      3. 用占位符填充模板得到完整 prompt
      4. Task(description="撰写子节 {h3_numbering} {h3_title}", prompt=...)
    ⚠️ 所有 Task 调用必须在同一条消息中发出，确保并发执行。

  result_checking:
    - check: "子 agent 超时"
      condition: "无返回结果"
      action: "重试一次，同样参数"
    - check: "首行非 ###"
      condition: "regex `^#{1,2}\\s+` 命中（即 # 或 ##）"
      action: "立即重派一次，prompt 强调'禁止使用 # 或 ##'"
    - check: "标题含编号 prefix"
      condition: "regex `^### \\d+(\\.\\d+)+\\s+` 命中（如 '### 1.2.1 ...'）"
      action: "立即重派一次，prompt 强调'禁止在标题文本里写编号'"
    - check: "字数不足"
      condition: "输出 < 目标字数 × 50%"
      action: "标记给 Phase 2C 补充扩展"
    - check: "术语违规"
      condition: "使用了禁用变体"
      action: "标记给 Phase 2C 统一替换（无需重试）"
    - check: "内容跑题"
      condition: "未覆盖 core_argument"
      action: "重试，prompt 强调核心论点"
    - check: "图片缺失"
      condition: "image_plan 中某项 path 在输出 Markdown 中找不到对应 ![]() 引用"
      action: "Phase 2C 补嵌（按 placement_hint 插在末尾）"
    - check: "多数失败"
      condition: ">50% 子 agent 失败"
      action: "降级到顺序写作模式（回退执行 Step 3）"

  degradation_message: "⚠️ 并行写作模式失败（{失败数}/{总数} 子节未完成），降级到顺序写作模式"

# ============================================================
# Phase 2.5R 审核 subagent dispatch 配置（v2.0 NEW）
# ============================================================

phase_2_5r_dispatch:
  description: "每章 Phase 2C 完成、Phase 3 输出前，并行分派 spec + quality reviewer。"

  dispatch_rule: |
    主 session 在单条消息中并发分派两个 reviewer：
      1. Read $SKILL_DIR/agents/spec-reviewer.md 拿模板，按 spec_reviewer_packaging 填占位符
         → Task(description="规格审查 {chapter_numbering} {chapter_title}", prompt=...)
      2. Read $SKILL_DIR/agents/quality-reviewer.md 拿模板，按 quality_reviewer_packaging 填占位符
         → Task(description="质量审查 {chapter_numbering} {chapter_title}", prompt=...)
    ⚠️ 两个 Task 必须在同一条消息中发出，确保并发执行。

  spec_reviewer_packaging:
    required:
      - name: chapter_numbering
        source: "当前章节 numbering（如 '1.3'）"
      - name: chapter_title
        source: "当前章节 title（不含编号）"
      - name: draft_docx_path
        source: "Phase 3 输出的章节 DOCX 路径（绝对路径）"
      - name: outline_subsections_yaml
        source: "OUTLINE_SUBSECTIONS[chapter_numbering] 的 YAML 序列化（含 numbering/title/depth）"
      - name: l2_target_words
        source: "WORD_OVERRIDE.get(2) 或模板默认"
      - name: l3_target_words
        source: "WORD_OVERRIDE.get(3) 或 900"
      - name: l4_target_words
        source: "WORD_OVERRIDE.get(4) 或 600"
      - name: m4_scoring_points
        source: "M4 评分项中与本章相关的部分"

  quality_reviewer_packaging:
    required:
      - name: chapter_numbering
        source: "同上"
      - name: chapter_title
        source: "同上"
      - name: draft_docx_path
        source: "同上"
      - name: terminology_table
        source: "Writing Brief terminology_table（统一用语 / 禁用变体）"
      - name: kb_excerpts_used
        source: |
          本章实际引用的 KB 素材摘要（主 session 从 KB_MATERIALS 中提取已被本章
          引用的部分；空则填"本章未引用 KB 素材"，reviewer 将跳过 KB 矛盾检查）

  result_handling:
    - status: "DONE / DONE"
      action: "进 Phase 3 后续输出"
    - status: "任一 NEEDS_REVISION"
      action: |
        主 session 应用修订列表（直接 Edit docx，或对受影响 H3 重派 writer 重写），
        重跑两个 reviewer。最多 2 轮。
    - status: "2 轮仍 NEEDS_REVISION"
      action: |
        写 audit log 到章节 docx 同目录的 <chapter>.audit.md（含两个 reviewer 的最后报告），
        进 Phase 3 但终端提示用户人工审。不阻塞流程。

# ============================================================
# 全局写作规则精简版（从 article_core.yaml 提取）
# ============================================================

global_writing_rules_template: |
  1. **评分导向**：高分值评分项（≥10分）重点展开，低分值项（<5分）简明响应
  2. **数据支撑**：用量化数据支撑论述（性能指标、案例规模、认证数量）
  3. **结构化表达**：每个功能/方案按"需求响应→方案设计→实现路径→预期效果"展开
  4. **差异化突出**：在对应位置突出厂商差异化优势
  5. **红线规避**：不得违反废标条款和风险红线
  6. **篇幅要求**：
     - 三级子节（X.X.X）不少于 {word_override_3} 字
     - 四级子节（X.X.X.X）不少于 {word_override_4} 字
     - 五级子节（X.X.X.X.X）不少于 {word_override_5} 字
  7. **表格优先**：技术要求响应、功能对比、里程碑计划等用表格呈现
  8. **中文排版**：中英文间加空格，数字与中文间加空格

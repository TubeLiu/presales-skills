# 厂商优先检索站点列表
# 用途：Phase 1.3 互��网检索时，优先在这些站点中搜索
# 维护方式：手动编辑，按厂商分组添加站点
# 被引用于：taw/SKILL.md Phase 1.3 互联网检索

# ── 使用说明 ──
# 1. vendor_name 用于匹配 VENDOR_NAME 参数（不区分大小写）
# 2. sites 列表中的域名会作为搜索的 allowed_domains 优先检索
# 3. 每个厂商可配置多个站点（官网、文档站、博客等）
# 4. authority_sites 为通用权威站点，所有搜索均可使用
# 5. 搜索时：先用厂商站点 + 权威站点做一轮定向搜索，再做不限域名的补充搜索

# ── 通用权威站点（所有场景可用）──
authority_sites:
  technical:
    - "kubernetes.io"
    - "www.cncf.io"
    - "docs.docker.com"
    - "www.infoq.cn"
    - "cloud.google.com"
  standards:
    - "www.gov.cn"
    - "std.samr.gov.cn"
    - "www.iso.org"
    - "www.ccsa.org.cn"

# ── 厂商站点列表 ──
vendors:
  - vendor_name: 博云
    aliases: [beyondclaw, BoCloud]
    sites:
      - "www.bocloud.com.cn"
      - "docs.bocloud.com.cn"

  - vendor_name: 灵雀云
    aliases: [alauda]
    sites:
      - "www.alauda.cn"
      - "docs.alauda.cn"

  - vendor_name: 华为
    aliases: [huawei]
    sites:
      - "www.huawei.com"
      - "support.huawei.com"
      - "e.huawei.com"

  - vendor_name: 阿里云
    aliases: [alicloud, aliyun]
    sites:
      - "www.aliyun.com"
      - "help.aliyun.com"
      - "developer.aliyun.com"

  - vendor_name: 腾讯云
    aliases: [tencent, tencentcloud]
    sites:
      - "cloud.tencent.com"
      - "www.tencentcloud.com"

  - vendor_name: 红帽
    aliases: [redhat, Red Hat]
    sites:
      - "www.redhat.com"
      - "access.redhat.com"
      - "docs.openshift.com"

  - vendor_name: VMware
    aliases: [vmware, broadcom]
    sites:
      - "www.vmware.com"
      - "docs.vmware.com"
      - "tanzu.vmware.com"

  - vendor_name: Rancher
    aliases: [suse, rancher]
    sites:
      - "www.rancher.com"
      - "ranchermanager.docs.rancher.com"
      - "www.suse.com"

  # ── 添加新厂商模板 ──

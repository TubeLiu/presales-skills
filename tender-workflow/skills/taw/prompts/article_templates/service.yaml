# 服务部分章节模板
# v2.0.0 | 语义驱动，无硬编码章节号

chapter_type: service
display_name: "服务部分"
description: "实施服务、培训服务、售后服务、运维保障"

# ─────────────────────────────────────────────
# 通用写作规则（适用于所有服务类章节）
# ─────────────────────────────────────────────
writing_rules: |
  **服务部分写作总则**：
  - 服务方案须具体可落地，避免空洞承诺
  - 服务响应时间、服务级别须与 M3 服务要求一致
  - 服务团队配置标注 `[待商务确认]`
  - 服务流程须清晰，配合流程图说明
  - 体现{VENDOR_NAME}服务体系和服务能力优势

# ─────────────────────────────────────────────
# 章节类型细分（按语义，不按编号）
# ─────────────────────────────────────────────
section_types:
  implementation_service:
    semantic_keywords: [实施服务, 项目实施, 实施保障, 实施方案, 实施计划]
    word_count: 4500
    image_quota: 2
    required_images: 1
    content_elements:
      - 实施服务内容（需求调研、方案设计、系统部署、数据迁移、系统集成）
      - 实施服务流程（准备阶段、实施阶段、验收阶段）
      - 实施服务标准（交付标准、验收标准、质量标准）
      - 实施服务团队（项目经理、技术专家、实施工程师）
      - 实施服务承诺（实施周期、实施质量、实施风险控制）
    kb_priority: [reusable, history]
    image_types: [实施流程图, 实施计划图, 甘特图]
    scoring_alignment: |
      重点关注评分标准中的"实施服务"要求：
      - 实施方法论（成熟度、可行性）
      - 实施团队（资质、经验）
      - 实施计划（合理性、可控性）

  training_service:
    semantic_keywords: [培训服务, 培训计划, 知识转移, 培训体系, 培训方案]
    word_count: 1500
    image_quota: 1
    required_images: 1
    content_elements:
      - 培训服务内容（产品培训、技术培训、运维培训、管理培训）
      - 培训服务对象（管理员、开发者、运维人员、最终用户）
      - 培训服务方式（现场培训、远程培训、在线培训、实操演练）
      - 培训服务计划（培训时间、培训地点、培训讲师、培训课时）
      - 培训服务效果（培训考核、培训认证、培训反馈）
    kb_priority: [fixed, reusable]
    image_types: [培训体系图, 培训路径图]

  after_sales_service:
    semantic_keywords: [售后服务, 技术支持, 故障处理, 服务响应, 服务保障]
    word_count: 4500
    image_quota: 2
    required_images: 1
    content_elements:
      - 售后服务内容（技术支持、故障处理、版本升级、安全补丁）
      - 售后服务响应（7x24小时、响应时间、解决时间）
      - 售后服务流程（故障报修、故障诊断、故障处理、故障关闭）
      - 售后服务团队（服务经理、技术专家、服务工程师）
      - 售后服务承诺（服务级别、服务质量、服务满意度）
    kb_priority: [fixed, reusable]
    image_types: [服务流程图, 故障分级图, SLA响应图]
    scoring_alignment: |
      重点关注评分标准中的"售后服务"要求：
      - 服务响应时间（7x24、4小时、8小时）
      - 服务覆盖范围（现场、远程、电话、邮件）
      - 服务质量保障（SLA、服务报告、满意度调查）

  operation_support:
    semantic_keywords: [运维保障, 运维服务, 日常巡检, 应急预案, 运维方案]
    word_count: 1500
    image_quota: 1
    required_images: 0
    content_elements:
      - 运维保障内容（日常巡检、性能监控、安全加固、备份恢复）
      - 运维保障流程（巡检流程、监控流程、应急流程、变更流程）
      - 运维保障工具（监控工具、运维工具、自动化工具）
      - 运维保障团队（运维经理、运维工程师、值班人员）
      - 运维保障承诺（巡检频率、监控覆盖、应急响应）
    kb_priority: [reusable]
    image_types: [运维架构图, 巡检流程图, 应急预案图]

# ─────────────────────────────────────────────
# 图片推荐规则（按语义触发，不按章节号）
# ─────────────────────────────────────────────
image_recommendations:
  - triggers: [实施流程, 实施步骤, 实施阶段]
    type: 流程图
    description: 实施服务流程图（准备/实施/验收）
    placement: after_content
    priority: high

  - triggers: [实施计划, 项目计划, 里程碑]
    type: 甘特图
    description: 实施服务计划甘特图
    placement: after_content
    priority: medium

  - triggers: [培训体系, 培训路径, 培训计划]
    type: 流程图
    description: 培训服务体系图（分角色/分阶段）
    placement: after_content
    priority: medium

  - triggers: [售后服务, 服务流程, 故障处理]
    type: 流程图
    description: 售后服务流程图（报修/诊断/处理/关闭）
    placement: after_content
    priority: high

  - triggers: [服务响应, 响应时间, 故障分级, SLA]
    type: 流程图
    description: 故障分级响应升级流程图（P1-P4）
    placement: after_content
    priority: high

  - triggers: [运维服务, 运维流程, 日常巡检, 应急预案]
    type: 流程图
    description: 运维保障体系架构图（巡检/监控/应急）
    placement: after_content
    priority: medium

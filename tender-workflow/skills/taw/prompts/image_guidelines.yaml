# 图片处理护栏与参考 v1.0
# 核心原则：图片优先从 KB Markdown 上下文中自然获取。
# AI 基于图文共生关系自主决定是否使用图片。
# 本文件仅提供硬限制护栏和无 KB 匹配时的参考提示。

# ─────────────────────────────────────────────
# 硬限制护栏（AI 不可覆盖）
# ─────────────────────────────────────────────
guardrails:
  chapter_max: 8          # 单章节最大图片数
  h3_max: 1               # 单个 H3 最多 1 张图片
  chapter_dedup: true      # 同章节不重复使用同一图片
  cross_chapter_dedup: true # 跨章节不重复使用同一图片（GLOBAL_USED_IMAGES）
  min_file_size_kb: 5      # 图片文件最小 5KB，低于此值跳过

# ─────────────────────────────────────────────
# 无 KB 匹配时的 AI 判断参考
# ─────────────────────────────────────────────
# 以下仅供 AI 参考，不是硬规则。
# AI 应根据 H3 实际内容、评分项权重、章节整体图片密度自主决定。
no_kb_hints:
  likely_need_image:
    - "描述系统架构、分层设计、组件关系"
    - "描述流程、步骤、工作流"
    - "描述部署方案、网络拓扑"
    - "描述监控体系、告警架构"
    - "描述安全架构、防护层次"
  likely_skip_image:
    - "纯文字论述、承诺声明"
    - "功能列表、参数表格"
    - "资质描述、人员介绍"
    - "概述性内容、方案总结"

# ─────────────────────────────────────────────
# 动态 Caption 规范
# ─────────────────────────────────────────────
caption:
  format: "图 {章节号}-{序号}：{结合 H3 上下文的描述}"
  rules:
    - "标题必须与 H3 内容上下文相关，不能用通用图片描述"
    - "KB 来源的图片：结合 H3 主题和图片在 KB 中的上下文重新生成标题"
    - "AI/drawio 生成的图片：标题应描述图片展示的核心内容"
    - "占位符：标题要具体描述需要什么图，便于后续人工补充"
  placeholder_format: "图 {章节号}-{序号}：{具体描述需要什么图}，请在此处插入对应图片"

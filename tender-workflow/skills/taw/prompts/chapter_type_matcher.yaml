# 章节类型语义匹配配置
# v1.0.0 | 用于识别章节属于哪个类型（business/technical/service/commitment）

prompt:
  name: chapter_type_matcher
  version: "1.0.0"
  description: 根据章节标题和内容纲要，识别章节类型

  # ─────────────────────────────────────────────
  # 章节类型定义
  # ─────────────────────────────────────────────
  chapter_types:
    business:
      display_name: "商务部分"
      description: "企业资质、项目业绩、团队配置、财务状况、商务响应"
      keywords:
        - 公司简介
        - 企业资质
        - 资质证明
        - 资质响应
        - 项目业绩
        - 类似项目
        - 项目案例
        - 成功案例
        - 团队简历
        - 人员配置
        - 项目团队
        - 财务状况
        - 财务报表
        - 资信证明
        - 商务偏离
        - 商务响应
        - 投标保证金
        - 企业信用
        - 荣誉资质

    technical:
      display_name: "技术部分"
      description: "需求分析、技术方案、产品功能、性能安全、实施计划"
      keywords:
        - 需求分析
        - 项目理解
        - 需求理解
        - 现状分析
        - 痛点分析
        - 技术方案
        - 总体方案
        - 整体架构
        - 总体架构
        - 架构设计
        - 产品功能
        - 功能特性
        - 核心功能
        - 产品能力
        - 性能指标
        - 容量规划
        - 性能测试
        - 基准测试
        - 安全方案
        - 安全架构
        - 安全设计
        - 等保
        - 信息安全
        - 高可用
        - 容灾方案
        - 容灾
        - 双活
        - 灾备
        - 运维管理
        - 监控告警
        - 自动化运维
        - 实施方案
        - 实施计划
        - 项目实施
        - 培训方案
        - 培训计划
        - 技术偏离
        - 技术响应

    service:
      display_name: "服务部分"
      description: "实施服务、培训服务、售后服务、运维保障"
      keywords:
        - 实施服务
        - 项目实施
        - 实施保障
        - 培训服务
        - 培训计划
        - 知识转移
        - 售后服务
        - 技术支持
        - 运维保障
        - 运维服务
        - 服务响应
        - 服务承诺
        - 质保服务
        - 维保服务
        - 服务体系
        - 服务方案

    commitment:
      display_name: "承诺部分"
      description: "交付承诺、服务承诺、质量承诺"
      keywords:
        - 交付承诺
        - 服务承诺
        - 质量承诺
        - 履约承诺
        - 保障措施
        - 违约责任
        - 承诺函
        - 保证措施

  # ─────────────────────────────────────────────
  # 匹配策略
  # ─────────────────────────────────────────────
  matching_strategy: |
    **输入**：章节标题（如"1.3 总体方案设计"）

    **输出**：章节类型（business/technical/service/commitment）+ 置信度

    **匹配步骤**：
    1. 提取章节标题中的关键词（去除编号）
    2. 与各类型的 keywords 进行语义匹配
    3. 计算匹配度（关键词交集数 / 总关键词数）
    4. 选择匹配度最高的类型
    5. 若匹配度 < 0.6，使用 LLM 语义理解

    **示例**：
    - "1.2 项目理解与需求分析" → technical（匹配关键词：需求分析、项目理解）
    - "1.3 总体方案设计" → technical（匹配关键词：总体方案、架构设计）
    - "1.10 售后服务方案" → service（匹配关键词：售后服务）
    - "1.10.3 服务响应承诺" → commitment（匹配关键词：服务承诺、响应承诺）

  # ─────────────────────────────────────────────
  # Few-shot 示例
  # ─────────────────────────────────────────────
  examples:
    - input: "1.2 项目理解与需求分析"
      output:
        type: technical
        confidence: 0.90
        matched_keywords: [需求分析, 项目理解]
        reasoning: "标题中包含'需求分析'和'项目理解'，属于技术部分"

    - input: "1.3 总体技术方案"
      output:
        type: technical
        confidence: 0.90
        matched_keywords: [技术方案, 总体方案]
        reasoning: "标题中包含'技术方案'和'总体方案'，属于技术部分"

    - input: "1.10 售后服务方案"
      output:
        type: service
        confidence: 0.92
        matched_keywords: [售后服务]
        reasoning: "标题中包含'售后服务'，属于服务部分"

    - input: "1.10.3 服务响应承诺"
      output:
        type: commitment
        confidence: 0.95
        matched_keywords: [服务承诺, 响应承诺]
        reasoning: "标题中包含'服务响应承诺'，属于承诺部分"

    - input: "1.4.2 容器编排与集群管理方案"
      output:
        type: technical
        confidence: 0.85
        matched_keywords: [技术方案, 架构设计]
        reasoning: "虽然标题中没有直接匹配的关键词，但'容器编排'和'集群管理'属于技术方案范畴"

    - input: "公司简介与资质证明"
      output:
        type: business
        confidence: 0.95
        matched_keywords: [公司简介, 企业资质, 资质证明]
        reasoning: "标题中包含'公司简介'和'资质证明'，属于商务部分（注：当前大纲仅含技术部分，此示例用于演示语义匹配能力）"

    - input: "总体方案设计"
      output:
        type: technical
        confidence: 0.88
        matched_keywords: [总体方案, 架构设计]
        reasoning: "无章节编号，但标题语义明确属于技术方案"

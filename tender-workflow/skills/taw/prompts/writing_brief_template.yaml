# 写作蓝图模板（Writing Brief Template）
# v1.0.0 | 用于并行写作模式的全局写作指导生成
# 当 USE_PARALLEL_WRITING = true 时，Phase 2A 据此生成 Writing Brief

name: writing_brief_generator
version: "1.0.0"
description: |
  为长章节生成并行写作蓝图，指导多个子智能体协同撰写。
  蓝图不包含正文内容，只做结构规划和任务分配。

# ============================================================
# Brief 结构定义
# ============================================================

brief_structure:

  # 1. 论述主线（全章核心论证逻辑）
  argument_thread:
    description: "全章核心论证逻辑，3-5 句话概括递进关系"
    max_words: 200
    generation_rules:
      - 必须体现"问题→方案→价值"的论证递进
      - 必须包含厂商差异化定位（引用 M7.4 差异化亮点）
      - 禁止空泛描述，每句必须有具体指向
    example: |
      本章围绕「容器云平台赋能数字化转型」展开：
      1. 现状痛点：传统IT架构面临弹性不足、运维复杂、交付缓慢三大挑战
      2. 方案主线：以容器云平台为核心，构建云原生技术底座
      3. 核心能力：通过容器化改造→微服务治理→DevOps流水线，实现降本增效
      4. 差异化：强调混合云管理和信创适配方面的独特优势

  # 2. H3 分工表（每个 H3 子节的写作任务分配）
  h3_assignment_table:
    description: "每个 H3 子节的写作任务分配，是并发分发的核心依据"
    columns:
      h3_numbering: "子节编号（如 1.3.1）"
      h3_title: "子节标题"
      core_argument: "该节核心论点（1 句话，明确本节要证明什么）"
      scoring_points: "需覆盖的 M4 评分项 ID 列表"
      kb_materials: "应引用的知识库条目摘要（简短标识）"
      web_facts: "应引用的 WEB_FACTS 条目 ID"
      target_words: "目标字数（基于评分权重动态分配）"
      connect_from: "承接上一节的什么内容（首个 H3 写'章节引言'）"
      lead_to: "为下一节铺垫什么内容（末个 H3 写'章节总结'）"
      image_plan: |
        图片分配数组（v2.0 字段化）。每项格式：
        {path: 绝对路径, caption: "图 X-Y 标题", placement_hint: "开头|中段|末尾"}
        空数组 [] 表示本子节无图。
        path 必须是 Phase 2A 已 staged 的本地文件绝对路径（KB 匹配 /
        drawio gen / AI gen / web 下载 / placeholder 都可），不再用
        "无图"/"待生成" 之类字符串。
    example: |
      | 编号 | 标题 | 核心论点 | 评分项 | KB素材 | WEB_FACTS | 字数 | 承接 | 铺垫 | 图片 |
      |------|------|---------|--------|--------|-----------|------|------|------|------|
      | 1.3.1 | 总体架构设计 | 平台采用分层架构，满足弹性扩展需求 | S3.1, S3.2 | 架构方案_通用版 | WF-01, WF-03 | 1500 | 章节引言 | 架构如何落地为具体功能 | `[{path: "/abs/kb/images/arch.jpg", caption: "图 1.3-1 总体架构", placement_hint: "中段"}]` |
      | 1.3.2 | 核心功能实现 | 六大核心功能模块全面响应技术要求 | S3.3, S3.4, S3.5 | 功能清单_v2 | WF-02, WF-05 | 1800 | 架构设计中的功能模块 | 功能如何保障安全合规 | `[]` |
      | 1.3.3 | 安全与合规保障 | 多层安全体系确保等保合规 | S3.6 | 安全方案_金融版 | WF-04 | 1200 | 核心功能的安全需求 | 章节总结 | `[{path: "/abs/drafts/img/sec.png", caption: "图 1.3-2 安全合规体系", placement_hint: "末尾"}]` |

  # 3. 术语表（统一用语）
  terminology_table:
    description: "全章统一术语，所有子智能体必须严格遵守"
    max_entries: 20
    columns:
      preferred_term: "统一用语"
      forbidden_variants: "禁用变体（逗号分隔）"
      context: "使用场景说明"
    generation_rules:
      - 从 M7 关键词、KB 素材、WEB_FACTS 中提取高频术语
      - 产品名称必须统一（使用 VENDOR_NAME 变量或中性表达）
      - 技术术语以招标文件用语为准（M2 原文）
    example: |
      | 统一用语 | 禁用变体 | 使用场景 |
      |---------|---------|---------|
      | 容器云平台 | 云原生平台、容器平台、K8s平台 | 产品名称统一 |
      | 微服务治理 | 服务治理、微服务管理、服务管控 | 描述服务治理能力 |
      | DevOps 流水线 | CI/CD 管道、持续集成流程 | 描述交付流程 |

  # 4. 字数分配策略
  word_count_allocation:
    description: "基于评分权重的动态字数分配"
    strategy: |
      1. 总字数 = TARGET_WORDS（来自 WORD_OVERRIDE[2] 或 section_type.word_count）
      2. 预留字数：章节引言 300 字 + 章节总结 200 字（由 Phase 2C 生成）
      3. 可分配字数 = 总字数 - 500
      4. 按 M4 评分项分值权重分配：
         - 高分项（≥10 分）：权重 × 1.5
         - 中分项（5-9 分）：权重 × 1.0
         - 低分项（<5 分）：权重 × 0.7
      5. 每个 H3 最少 WORD_OVERRIDE[3] 或 900 字
      6. 若分配后总字数超出，按比例缩减非高分项

  # 5. 过渡指令
  transition_directives:
    description: "节间过渡指令，确保章节连贯"
    rules: |
      - connect_from：上一节末尾的核心结论或关键词，本节开头需自然承接
      - lead_to：本节末尾需铺垫的概念或问题，为下一节做引导
      - 首个 H3 的 connect_from 固定为"章节引言"（由 Phase 2C 生成）
      - 末个 H3 的 lead_to 固定为"章节总结"（由 Phase 2C 生成）
      - 过渡不要求专门的过渡段，而是通过首尾句自然衔接

# ============================================================
# 生成约束
# ============================================================

generation_constraints:
  max_brief_tokens: 1500
  language: zh-CN
  must_include:
    - argument_thread
    - h3_assignment_table
    - terminology_table
  quality_checks:
    - "所有 M4 评分项必须分配到至少一个 H3"
    - "字数分配总和 ≈ TARGET_WORDS（±10%）"
    - "术语表不含相互矛盾的条目"
    - "每个 H3 的 connect_from/lead_to 形成完整链条"

# ============================================================
# Phase 2A 执行步骤（生成 Writing Brief 的过程）
# ============================================================

phase_2a_execution:
  description: "为长章节生成结构化写作蓝图，不写正文，只做规划和任务分配"
  steps:
    - step: 1
      action: "Read prompts/writing_brief_template.yaml，获取蓝图格式规范"
    - step: 2
      action: "分析输入素材"
      details:
        - "从 M4 评分标准提取与当前章节相关的评分项及分值"
        - "从 Phase 1.3 KB 检索结果中，按 H3 子节主题分类标记素材归属"
        - "从 WEB_FACTS 表中，按'适用章节'筛选并分配到各 H3"
        - "从 M7 撰写指导提取关键词、差异化亮点、红线"
    - step: 3
      action: "按 brief_structure 生成 Writing Brief（论述主线 + H3 分工表 + 术语表）"
    - step: 4
      action: "蓝图质量验证（参照 generation_constraints.quality_checks）"
    - step: 5
      action: "输出 Writing Brief 并进入 Phase 2B"

# ============================================================
# Phase 2C 整合审校步骤（合并子智能体输出后执行）
# ============================================================

phase_2c_integration:
  description: "合并子智能体输出，补充引言/结语/过渡，确保全章一致性"
  steps:
    - step: 0
      action: "标题层级守门（v2.0 NEW）"
      detail: |
        在拼接前对每个 subagent 输出做检查：
        - 首行必须匹配 `^### ` （H3 起跳）；不得是 `# ` / `## `
        - 标题文本不得含编号 prefix（regex `^### \d+(\.\d+)+\s+` 命中即违规）
        不合规处理：直接降级到顺序写作（不私自修复，避免错上加错）；
        在 phase_2b_execution.result_checking 已有"立即重派一次"动作，
        Phase 2C 是最后防线。
    - step: 1
      action: "按 H3 顺序拼接所有子智能体输出"
    - step: 2
      action: "生成章节引言段（200-300 字）"
      details:
        - "基于 Writing Brief 的论述主线"
        - "概述本章的整体结构和核心价值"
        - "自然引出第一个 H3 子节"
    - step: 3
      action: "检查并补充过渡段落"
      details:
        - "检查每两个相邻 H3 之间的衔接是否自然"
        - "验证 connect_from / lead_to 指令是否被遵循"
        - "衔接不自然处插入 1-2 句桥接文字"
        - "禁止大段重写子 agent 输出，仅做最小化衔接修补"
    - step: 4
      action: "一致性审校"
      checks:
        - type: 术语扫描
          detail: "将禁用变体替换为术语表中的统一用语"
        - type: 矛盾检测
          detail: "检查是否有相互矛盾的技术描述"
        - type: 重复消除
          detail: "检查多个 H3 是否重复论述相同内容，精简保留最佳版本"
    - step: 5
      action: "M4 评分覆盖终检"
      detail: "对照 H3 分工表，逐一确认每个 M4 评分项在最终内容中有实质性响应；未覆盖的补充 2-3 句"
    - step: 5.5
      action: "图片清单核对（v2.0 NEW）"
      detail: |
        扫描合并后 Markdown 提取所有 ![]() 路径（regex `!\[([^\]]*)\]\(([^)]+)\)`），
        对照 image_plan 应有清单：
        - 每个 image_plan[i].path 必须在合并 Markdown 中至少出现一次
        - 任何缺失项 → 按 image_plan[i].placement_hint 补嵌到对应 H3 末尾
        - 路径在 Markdown 中但 image_plan 不含 → 警告（subagent 可能自创了图片，
          多数情况是 LLM 编造，需人工核对）
        最终所有 image_plan 100% 覆盖才进 Phase 2.5R。
    - step: 6
      action: "生成章节结尾段（100-200 字）"
      details:
        - "总结本章核心价值"
        - "呼应论述主线"
    - step: 7
      action: "合并完成后继续执行"
      next_steps:
        - "→ Step 2b（图片获取）：基于完整章节内容执行图片配额流程"
        - "→ Step 2d（大纲对齐自检）"
        - "→ Phase 2.5（执行阶段自检）"
        - "→ Phase 3（质量自检与输出）"
  output_format: |
    [并行写作整合] 章节 {章节号} {章节标题}
    - 子节数：{H3_COUNT}
    - 合并字数：{总字数}
    - 术语替换：{替换数} 处
    - 过渡补充：{补充数} 处
    - 评分覆盖：{已覆盖}/{总评分项} 项

# 通用企业招标文件模板（v2.0 - 聚焦技术规格与评标办法）

template:
  name: enterprise
  display_name: 通用企业
  description: 适用于民营企业、外资企业等通用企业的云原生IT产品及服务采购
  legacy_names: [goods_procurement, service_procurement]
  product_types:
    - 云原生容器平台（Kubernetes、多集群管理）
    - DevOps平台（CI/CD、流水线、代码质量）
    - 微服务治理平台（服务网格、配置中心、分布式追踪）
    - AI平台（模型训练、推理服务、GPU调度）
    - 云原生数据库/中间件（分布式数据库、消息队列、缓存）
    - 技术服务（咨询、实施、迁移、优化）
    - 维保服务（运维、巡检、故障处理、升级）

# 行业特征
characteristics:
  procurement_method: 竞争性谈判或询价
  evaluation_method: 综合评分法或最低价法
  price_weight: "40%"
  technical_weight: "40%"
  business_weight: "20%"
  core_concerns:
    - 性价比（成本优化）
    - 灵活性（快速部署、按需扩展）
    - 快速交付（≤3个月）
    - 易用性（降低运维成本）
    - 技术先进性
  common_requirements:
    - 灵活部署（公有云/私有云/混合云）
    - 快速上线（≤3个月）
    - 按需扩展
    - 成本优化
    - 易用易维护

# 评标办法默认结构
scoring_defaults:
  price_weight: "40%"
  business_weight: "20%"
  technical_weight: "40%"
  objective_score_ratio: "≥55%"

  business_scoring:
    - item: 企业资质等级
      weight: "2-4分"
      details: [软件企业认定, 高新技术企业]
    - item: 财务状况
      weight: "2-3分"
    - item: 类似项目业绩
      weight: "5-8分"
      details: [云原生平台项目, DevOps项目, 微服务项目]
    - item: 履约评价
      weight: "2-3分"
    - item: 认证体系
      weight: "2-3分"
      details: [ISO9001, ISO27001, CNCF认证]

  technical_scoring:
    - item: 需求理解
      weight: "4-6分"
    - item: 技术方案
      weight: "14-18分"
      sub_items:
        - 云原生架构设计
        - 灵活部署方案（公有云/私有云/混合云）
        - 快速交付方案
        - 成本优化方案
        - 易用性设计
    - item: 实施方案
      weight: "8-10分"
      sub_items:
        - 实施计划与里程碑（≤3个月）
        - 风险管理
        - 快速上线策略
    - item: 项目团队
      weight: "4-6分"
    - item: 售后服务
      weight: "4-6分"
      sub_items:
        - 响应时间承诺
        - 远程支持
        - 培训方案

# 技术规格默认框架
tech_spec_defaults:
  sections:
    - name: 项目总体要求
      content: [项目背景, 建设目标, 建设原则, 建设范围]
    - name: 业务需求分析
      content: [业务流程, 用户角色, 功能需求]
    - name: 云原生技术架构要求
      content:
        - 容器编排平台（Kubernetes）
        - 容器云平台核心能力
        - 多集群管理能力
        - 混合云/多云支持
    - name: 灵活部署要求
      content:
        - 公有云部署支持（阿里云、腾讯云、AWS等）
        - 私有云部署支持（VMware、OpenStack等）
        - 混合云部署支持
        - 边缘计算支持（可选）
    - name: 功能需求规格
      content: [功能模块清单, 各模块详细需求]
    - name: 非功能性要求
      content:
        - 性能要求
        - 安全要求
        - 可靠性要求（99.5%可用性）
        - 兼容性要求
        - 易用性要求
    - name: 快速交付要求
      content:
        - 项目周期（≤3个月）
        - 快速上线策略
        - 分阶段交付
        - 敏捷开发模式
    - name: 成本优化要求
      content:
        - 资源利用率优化
        - 按需扩展
        - 成本可视化
        - TCO分析
    - name: 交付物要求
      content: [软件交付物, 文档交付物, 培训要求]
    - name: 验收标准
      content: [功能验收, 性能验收, 易用性验收]

# 反控标行业覆盖配置
anti_control_overrides:
  allowed_specific_terms:
    - Kubernetes
    - CNCF
    - OCI
    - CNI
    - CSI
    - Docker
  required_standard_references:
    - ISO27001（如有安全要求）
    - ISO9001
  metric_sensitivity: low  # 企业采购灵活度高，指标调整可适度宽松

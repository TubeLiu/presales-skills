# 政府行业招标文件模板（v2.0 - 聚焦技术规格与评标办法）

template:
  name: government
  display_name: 政府行业
  description: 适用于政府机关、事业单位的云原生IT产品及服务采购
  legacy_names: [government_it]
  product_types:
    - 云原生容器平台（Kubernetes、多集群管理）
    - DevOps平台（CI/CD、流水线、代码质量）
    - 微服务治理平台（服务网格、配置中心、分布式追踪）
    - AI平台（模型训练、推理服务、GPU调度）
    - 云原生数据库/中间件（分布式数据库、消息队列、缓存）
    - 技术服务（咨询、实施、迁移、优化）
    - 维保服务（运维、巡检、故障处理、升级）

# 行业特征
characteristics:
  procurement_method: 公开招标
  evaluation_method: 综合评分法
  price_weight: "30%"
  technical_weight: "50%"
  business_weight: "20%"
  core_concerns:
    - 合规性（政府采购法、招标投标法）
    - 信创要求（国产化率≥70%）
    - 等保要求（三级及以上）
    - 政务云/国资云部署规范
    - 数据安全与隐私保护
  common_requirements:
    - 等保测评要求（三级及以上）
    - 国产化适配要求（信创）
    - 政务云/国资云部署规范
    - 数据安全合规
    - 云原生架构要求（Kubernetes原生）

# 评标办法默认结构
scoring_defaults:
  price_weight: "30%"
  business_weight: "20%"
  technical_weight: "50%"
  objective_score_ratio: "≥60%"

  business_scoring:
    - item: 企业资质等级
      weight: "3-5分"
      details: [CS等级, 软件企业认定, 高新技术企业]
    - item: 财务状况
      weight: "2-3分"
    - item: 类似项目业绩
      weight: "5-8分"
      details: [政务云项目, 云原生平台项目, 信创项目]
    - item: 履约评价
      weight: "2-3分"
    - item: 认证体系
      weight: "2-3分"
      details: [ISO27001, 等保测评, CNCF认证, 信创认证]

  technical_scoring:
    - item: 需求理解
      weight: "5-10分"
    - item: 技术方案
      weight: "15-20分"
      sub_items:
        - 云原生架构设计
        - 容器编排与管理
        - 网络方案（CNI）
        - 存储方案（CSI）
        - 国产化适配方案
        - 等保安全方案
    - item: 实施方案
      weight: "10-15分"
      sub_items:
        - 实施计划与里程碑
        - 风险管理
        - 质量保证
    - item: 项目团队
      weight: "5-10分"
    - item: 售后服务
      weight: "5-8分"
      sub_items:
        - 响应时间承诺
        - 驻场服务
        - 培训方案

# 技术规格默认框架
tech_spec_defaults:
  sections:
    - name: 项目总体要求
      content: [项目背景, 建设目标, 建设原则, 建设范围]
    - name: 业务需求分析
      content: [业务流程, 用户角色, 功能需求]
    - name: 云原生技术架构要求
      content:
        - 容器编排平台（Kubernetes）
        - 容器云平台核心能力
        - 多集群管理能力
        - 混合云/多云支持
    - name: 功能需求规格
      content: [功能模块清单, 各模块详细需求]
    - name: 非功能性要求
      content: [性能要求, 安全要求, 可靠性要求, 兼容性要求]
    - name: 等保安全要求
      content:
        - 等保级别（三级或以上）
        - 安全技术要求（身份鉴别、访问控制、安全审计等）
        - 安全管理要求
        - 容器安全专项要求
    - name: 国产化/信创要求
      content:
        - 国产化CPU支持（鲲鹏、海光、龙芯、飞腾）
        - 国产化操作系统支持（麒麟、统信UOS、欧拉）
        - 国产化数据库支持（达梦、人大金仓、OceanBase）
        - 信创产品兼容性认证
        - 国产化率要求（≥70%）
    - name: 交付物要求
      content: [软件交付物, 文档交付物, 培训要求]
    - name: 验收标准
      content: [功能验收, 性能验收, 安全验收, 等保测评通过]

# 反控标行业覆盖配置
anti_control_overrides:
  # 该行业中允许出现的特定术语（不视为品牌残留）
  allowed_specific_terms:
    - Kubernetes
    - CNCF
    - OCI
    - CNI
    - CSI
    - eBPF
  # 该行业要求引用的标准和规范
  required_standard_references:
    - 等保（GB/T 22239）
    - 政府采购法
    - 信创产品目录
    - 政务云管理规范
  # 指标调整敏感度（high=更激进地调整指标，避免精确匹配）
  metric_sensitivity: high

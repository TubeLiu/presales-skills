# 政府IT项目分析模板 v2.0
# 仅包含行业识别关键词 + 差异化扩展模块 prompt
# 基础7模块由 prompts/analysis.yaml 提供，本模板仅覆盖扩展部分

template:
  name: government_it
  version: "2.0.0"

  # 行业识别关键词（PROMPT.md Phase 0 使用）
  detection_keywords:
    - 政府采购
    - 政务
    - 财政拨款
    - 政府信息化
    - 数字政府
    - 智慧政务
    - 电子政务
    - 政务云
    - 政务大数据

  # 扩展模块（插入在 M1 之后，Phase 1 调用）
  extension_modules:

    - id: E1
      title: "E1. 预算合规分析"
      prompt: |
        ## E1. 预算合规分析

        ### 预算合理性
        - 预算金额与项目规模的匹配度（人均预算/每节点预算是否合理）
        - 与同类政府IT项目预算对比
        - 是否存在明显低价或高价异常

        ### 资金来源合规性
        | 分析项 | 内容 | 风险 | 原文出处 |
        |--------|------|------|---------|
        | 资金来源 | | | |
        | 是否列入年度预算 | | | |
        | 最高限价设置 | | | |
        | 付款比例（预付/进度/尾款） | | | |

        > 若文件未说明资金来源，标注"文件未明确"，提示存在资金到位风险。

    - id: E2
      title: "E2. 政府采购合规分析"
      prompt: |
        ## E2. 政府采购合规分析

        ### 合规检查清单
        - [ ] 采购方式选择是否合规（公开招标阈值、邀请招标条件）
        - [ ] 公告期是否符合规定（公开招标不少于20日）
        - [ ] 评标委员会组成是否合规（专家人数、来源）
        - [ ] 中小企业价格扣除政策（6%-10%）是否落实
        - [ ] 进口产品采购限制是否明确
        - [ ] 节能环保优先采购要求

        ### 关键合规风险

        | 风险点 | 合规要求 | 本项目情况 | 原文出处 |
        |--------|---------|-----------|---------|
        | | | | |

        > 合规风险较高项标注 `[废标]`，提示需要特别关注。

    - id: E3
      title: "E3. 安全保密分析"
      prompt: |
        ## E3. 安全保密分析

        ### 等保要求
        | 分析项 | 要求内容 | {VENDOR_NAME}应对 | 原文出处 |
        |--------|---------|-----------|---------|
        | 等保级别 | | | |
        | 测评时间要求 | | | |
        | 责任分工 | | | |

        ### 数据安全
        - 数据本地化要求（是否须境内存储）
        - 国产安全产品要求（防火墙/入侵检测/审计）
        - 日志留存时间要求（通常≥6个月）
        - 涉密系统分级保护要求（如涉及）

        > 国产安全产品要求标注 `[难点]`，涉密系统要求标注 `[废标]` 风险。

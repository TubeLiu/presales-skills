# 金融行业分析模板 v2.0
# 仅包含行业识别关键词 + 差异化扩展模块 prompt

template:
  name: finance
  version: "2.0.0"

  # 行业识别关键词（PROMPT.md Phase 0 使用）
  detection_keywords:
    - 银行
    - 保险
    - 证券
    - 金融
    - 支付
    - 清算
    - 核心系统
    - 风控
    - 反洗钱
    - 银保监会
    - 证监会
    - 央行
    - 基金

  # 扩展模块（插入在 M1 之后，Phase 1 调用）
  extension_modules:

    - id: E1
      title: "E1. 金融监管合规分析"
      prompt: |
        ## E1. 金融监管合规分析

        ### 适用监管框架（根据机构类型选择）

        | 监管要求 | 是否适用 | 要求内容 | 本项目情况 | 原文出处 |
        |---------|---------|---------|-----------|---------|
        | 银保监会信息科技风险管理指引 | | | | |
        | 证监会信息系统安全保障要求 | | | | |
        | 央行金融统计标准化要求 | | | | |
        | 反洗钱系统技术要求 | | | | |
        | 数据报送监管要求（1104报表等） | | | | |

        > 若为银行项目需分析核心系统改造审批；证券项目需分析交易系统特殊安全要求。
        > 适用标注"是"，不适用标注"N/A"，文件未明确标注"文件未明确"。

    - id: E2
      title: "E2. 数据安全与隐私保护分析"
      prompt: |
        ## E2. 数据安全与隐私保护分析

        ### 金融数据安全要求

        | 安全要求 | 具体内容 | {VENDOR_NAME}应对方案 | 原文出处 |
        |---------|---------|--------------|---------|
        | 数据分级保护 | | | |
        | 个人金融信息保护等级 | | | |
        | 数据加密要求（传输/存储） | | | |
        | 生产/测试数据隔离 | | | |
        | 数据访问控制（最小权限） | | | |
        | 数据跨境限制 | | | |

        > 个人金融信息保护C3/C2/C1等级要求须明确标注；加密算法若要求国密（SM2/SM3/SM4）标注 `[难点]`。

    - id: E3
      title: "E3. 业务连续性分析（RTO/RPO）"
      prompt: |
        ## E3. 业务连续性分析

        ### 高可用与灾备要求

        | 指标 | 要求值 | 是否明确 | 原文出处 |
        |------|--------|---------|---------|
        | 系统可用性（SLA） | | | |
        | RTO（恢复时间目标） | | | |
        | RPO（恢复点目标） | | | |
        | 同城双活/异地灾备 | | | |
        | 灾备切换演练频率 | | | |

        ### 关键业务保障
        - 交易高峰期承载能力要求
        - 年终决算等特殊时点保障
        - 多活架构支持要求

        > RTO/RPO 若为0或极短（<15分钟），标注 `[难点]`，说明对{VENDOR_NAME}平台的技术挑战。

# 通用行业分析模板 v2.0
# 仅包含行业识别关键词 + 通用扩展说明
# 通用模板不添加扩展模块，直接使用 prompts/analysis.yaml 的7模块框架

template:
  name: general
  version: "2.0.0"
  description: 适用于政府IT/国企/金融以外的所有行业

  # 行业识别：兜底模板，当其他3个模板均不匹配时自动加载
  # 无特定检测关键词（默认匹配）
  detection_keywords: []
  is_default: true

  # 通用模板无行业扩展模块，直接执行 M1-M7 基础框架
  extension_modules: []

  # 通用行业特别提示（在 Phase 0 宣告时显示）
  phase0_note: |
    行业类型：通用
    本项目未识别到政府/国企/金融特定关键词，将使用通用7模块分析框架。
    若行业判断有误，请告知实际行业，系统将重新加载对应扩展模块。

# 国有企业/央企分析模板 v2.0
# 仅包含行业识别关键词 + 差异化扩展模块 prompt

template:
  name: state_owned_enterprise
  version: "2.0.0"

  # 行业识别关键词（PROMPT.md Phase 0 使用）
  detection_keywords:
    - 国资委
    - 央企
    - 国有企业
    - 国资
    - 省属企业
    - 市属企业
    - 国有控股
    - 能源
    - 电力
    - 石化
    - 石油
    - 电信
    - 铁路
    - 航空

  # 扩展模块（插入在 M1 之后，Phase 1 调用）
  extension_modules:

    - id: E1
      title: "E1. 国资监管合规分析"
      prompt: |
        ## E1. 国资监管合规分析

        ### 采购管理合规检查
        - [ ] 是否执行《国有企业采购操作规范》
        - [ ] 采购方式是否符合国资监管要求
        - [ ] 是否在阳光采购平台/企业电子招标平台采购
        - [ ] 大额投资是否需国资委审批或备案
        - [ ] 中标结果公示要求

        ### 关键合规风险
        | 风险点 | 要求内容 | 本项目情况 | 原文出处 |
        |--------|---------|-----------|---------|
        | | | | |

    - id: E2
      title: "E2. 信创国产化要求分析"
      prompt: |
        ## E2. 信创国产化要求分析

        ### 国产化硬件/软件要求矩阵

        | 层级 | 具体要求 | 指定型号（若有） | {VENDOR_NAME}适配情况 | 原文出处 |
        |------|---------|----------------|--------------|---------|
        | CPU芯片 | | 鲲鹏/飞腾/海光/兆芯/龙芯/申威 | | |
        | 操作系统 | | 统信UOS/麒麟/欧拉 | | |
        | 数据库 | | 达梦/人大金仓/海量/神通 | | |
        | 中间件 | | 东方通/宝兰德 | | |
        | 容器平台 | | | | |

        > 若文件未指定具体型号，填"文件未明确"。
        > 若指定了{VENDOR_NAME}不支持的型号，标注 `[风险-需评估]`。

        ### 信创认证要求
        - 是否要求信创产品目录认证
        - 是否要求提供信创适配证书
        - 是否要求国产化测试报告
        - 供应链安全审查要求

    - id: E3
      title: "E3. 廉政风险防控分析"
      prompt: |
        ## E3. 廉政风险防控分析

        ### 廉政合规要求清单
        - [ ] 廉洁从业承诺书要求（出处：___）
        - [ ] 关联关系披露要求（出处：___）
        - [ ] 行贿犯罪档案查询要求（出处：___）
        - [ ] 回避制度（利益冲突/近亲属）（出处：___）
        - [ ] 审计配合义务（出处：___）
        - [ ] 黑名单/失信惩戒排查（出处：___）

        ### 特殊廉政条款说明
        > 若招标文件含超出常规的廉政要求，逐条列出并说明合规应对措施。
        > 无特殊要求则填"文件未明确特殊廉政条款，按行业惯例处理"。

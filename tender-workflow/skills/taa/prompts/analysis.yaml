# 招标文件深度分析 Prompt — 7模块框架
# v2.0.0 | 核心分析 prompt，由 PROMPT.md Phase 1 调用

prompt:
  name: tender_analysis_7modules
  version: "2.0.0"
  description: 对招标文件进行7模块深度分析，输出完整 Markdown 报告

  # ─────────────────────────────────────────────
  # 全局分析规则（贯穿所有模块）
  # ─────────────────────────────────────────────
  global_rules: |
    **分析规则（所有模块均须遵守）**
    1. 每条分析必须标注原文出处（章节/页码），格式：`（出处：第X章 P.XX）`
    2. 废标条款用 `[废标]` 标注，扣分项用 `[扣分]`，撰写难点用 `[难点]`
    3. 必须条款/★号条款用 `【必须】` 标注
    4. 招标文件要求提取必须覆盖以下所有格式，不得因格式差异遗漏：
       - 结构化表格（含表头、表尾注释、合并单元格）
       - 段落正文中的嵌入式要求（"投标人应…"、"系统须…"、"不低于…"等句式）
       - 编号列表（多级嵌套：1.2.3 / a/b/c / ①②③）
       - 附件/附录中的独立要求（注意附件可能有独立编号体系）
       - 混合格式（表格标题 + 段落说明 + 脚注补充 须合并为完整条目）
    5. 特殊标记检测（全文档预扫描）：
       a) 首先扫描全文，识别标记定义语句（如"带有★号的条款为废标条款"、"标注*的为加分项"、"△为可选项"），建立本文档的**标记语义映射表**
       b) 识别以下标记类型：★、*（星号）、△、▲、◆、●，以及文字标记："（加分项）"、"（否决性条款）"、"（实质性要求）"、"（必须响应）"
       c) 根据标记语义映射表确定每个标记的实际含义（废标/加分/必须/可选），而非硬编码假设
       d) 标记映射表须在 M2 表格前输出，格式：`标记映射：★ = 废标条款（出处：第X章 P.XX）`
    6. 全文档扫描原则：必须遍历招标文件所有章节（正文、附件、附录、合同范本、技术规范书），不得因主观判断跳过任何章节。附件内容须与正文交叉核对。
    7. 信息缺失时填写"**文件未明确**"，严禁臆测数字（金额、日期、参数）
    8. 所有"{VENDOR_NAME}"支持度判断依据：
       - **有产品能力说明书**（`--product` 已提供）：严格基于说明书中列出的功能、参数、资质进行匹配，说明书未提及的能力视为"需确认"
       - **无产品能力说明书**：基于 AI 对 {VENDOR_NAME} 的互联网公开信息进行模糊评估，在评估结果后标注 `（AI 模糊评估，建议确认）`
    9. 分析内容须针对本项目，禁止输出通用模板语句

  # ─────────────────────────────────────────────
  # 7 大分析模块
  # ─────────────────────────────────────────────
  modules:

    # ── M1：项目概况 ──────────────────────────────
    - id: M1
      title: "M1. 项目概况与投标建议"
      prompt: |
        ## M1. 项目概况与投标建议

        ### 1.1 基本信息表

        | 项目维度 | 详细内容 | 备注 |
        |---------|---------|------|
        | 项目名称 | | |
        | 招标编号 | | |
        | 采购单位 | | |
        | 行业领域 | | |
        | 预算金额 | | |
        | 交付周期 | | |
        | 投标截止时间 | | |
        | 核心采购内容 | | |

        > 说明：所有字段从文件中提取，缺失项填"文件未明确"，禁止估算。

        ### 1.2 业务匹配度分析

        列出与{VENDOR_NAME}核心能力的匹配点：

        **有产品能力说明书时**：逐条对照说明书中的技术能力、资质、案例与招标要求进行匹配分析。
        **无产品能力说明书时**：基于 AI 对 {VENDOR_NAME} 的互联网公开信息进行模糊匹配。

        - ✅ 完全匹配项（含出处，有说明书时引用说明书对应能力）
        - ⚠️ 需要定制或补充的项（含风险说明）
        - ❌ 能力缺口项（需如实说明）

        ### 1.3 投标建议

        综合匹配度、竞争格局、技术难度、商务风险，给出明确建议：

        **【强烈建议投标】** — 高度匹配，竞争优势明显，风险可控
        **【建议投标】** — 基本匹配，需针对性准备，投入产出比合理
        **【谨慎投标】** — 存在较大能力缺口或风险，需团队评估后决策
        **【不建议投标】** — 关键能力不符、废标风险高或商务条款不合理

        选择一项并说明理由（3-5条具体依据，每条标注原文出处）。

    # ── M2：技术要求 ──────────────────────────────
    - id: M2
      title: "M2. 技术与服务要求分析矩阵"
      prompt: |
        ## M2. 技术与服务要求分析矩阵

        按以下分类体系提取招标文件中的所有技术与服务要求，每条独立成行。

        **有产品能力说明书时的结构化匹配流程**：

        ### 匹配步骤

        **Step 1: 关键词提取**
        从招标要求原文提取核心关键词（技术术语、功能名称、指标名称）

        **Step 2: 索引检索**
        在 PRODUCT_INDEX 中搜索匹配条目：
        - **精确匹配**：entry.keywords 与招标关键词有交集
        - **名称匹配**：entry.name 包含招标关键词
        - **分类匹配**：entry.category 与招标分类一致

        **Step 3: 匹配判定**
        - `✅完全支持` = 找到明确对应条目（填写匹配条目的 entry.id）
        - `⚠️[需定制]` = 找到相关条目但需调整（填写 entry.id，备注说明差异）
        - `⚠️[风险-需评估]` = 未找到明确匹配
        - `❌不支持` = 明确不具备此能力

        ### 输出表格

        | ID | 分类 | 技术要求（原文关键指标） | 优先级 | {VENDOR_NAME}支持度 | 匹配依据 | 原文出处 |
        |----|------|----------------------|--------|-------------|----------|----------|
        | T1 | | | | | | |

        **匹配依据列填写规则**：
        - 有产品能力说明书时：填写 `entry.id (entry.name)`（如 `技术能力清单_1 (多集群管理)`），未匹配填"未找到匹配"
        - 无产品能力说明书时：填"AI 模糊评估"
        - 说明：包含 entry.name 可以让用户更直观地理解匹配的功能点

        **分类定义**：

        **技术能力类**（参考分类，AI 可动态扩展）：

        以下为云原生/AI/基础设施领域的常见技术分类，作为提取参考：
        - 平台管理（K8s/容器编排/集群管理）
        - 存储（持久化存储/对象存储/文件系统）
        - 网络（SDN/负载均衡/网络策略）
        - 安全（认证/授权/审计/等保）
        - 国产化适配（芯片/OS/中间件/数据库）
        - 监控运维（可观测性/告警/日志）
        - DevOps（CI/CD/流水线/制品库）
        - 集成接口（API/中间件集成/数据对接）
        - 性能指标（并发/响应时间/节点规模）

        **动态扩展规则**：
        - 以上仅为参考，不是封闭枚举。若招标文件中出现不属于以上分类的技术要求（如 AI/ML 推理、边缘计算、Serverless、数据治理、大数据平台等），须根据要求内容自行创建新分类
        - 新分类命名须简洁明确，格式与参考分类一致：`分类名（关键词1/关键词2/关键词3）`
        - 禁止将不相关的要求强行归入已有分类，宁可新建分类也不要误归
        - 始终保留「其他技术要求」作为兜底分类

        **服务与管理类**（固定枚举，跨行业通用）：
        - 交付验收（交付里程碑/验收标准/试运行要求/上线条件）
        - 售后服务（质保期限/故障响应时间/驻场服务/备件要求）
        - 培训要求（培训对象/培训内容/培训课时/培训方式/考核要求）
        - 技术支持（技术咨询/远程支持/现场支持/7×24保障/节日重保/SLA）
        - 项目管理（项目经理资质/项目管理方法论/文档交付物/沟通机制/变更管理）
        - 人员要求（团队规模/人员资质证书/驻场人数/关键岗位要求）

        > 注意：某些要求可能横跨多个分类，应归入最直接相关的分类，并在备注列注明关联分类。

        **优先级标识**（由 AI 根据标记映射表和招标文件判断）：
        - `【必须/废标】` = 标记映射表中定义为废标/否决性的标记所标注的条款
        - `【必须】` = 招标文件明确标注★号或"必须"/"应"/"须"字样，或标记映射表中定义为必须响应的条款
        - `🔴重要` = 评分项或资质门槛要求
        - `🟡一般` = 加分项或可选要求
        - `🟢参考` = 标记映射表中定义为建议/参考的条款

        > 优先级判定必须依据 global_rules 第5条建立的标记映射表，不得仅凭标记符号形状推断含义。

        **"{VENDOR_NAME}支持度"填写说明**（供售前团队参考）：
        - `✅完全支持` = 产品标准功能，无需改动
        - `⚠️[需定制]` = 核心功能具备，需针对性方案设计
        - `⚠️[风险-需评估]` = 能力存在差距，需技术评估
        - `❌不支持` = 当前版本不具备此能力

        > 每条要求必须有原文出处，精确引用关键指标数值（如"≥100节点"、"RTO≤15分钟"）。
        > 不得遗漏任何★号要求。有产品能力说明书时**必须填写匹配依据列**，引用 entry.id。

        **多格式提取指引**：
        1. **表格提取**：逐行扫描，注意表头定义的字段含义、合并单元格、表尾脚注中的补充要求
        2. **段落提取**：识别"投标人应…"、"系统须…"、"要求具备…"、"不低于…"等要求句式，从段落中拆分出独立要求条目
        3. **列表提取**：识别多级编号列表（1.2.3.4 或 a/b/c 或 ①②③），每个编号项视为独立要求
        4. **附件提取**：附件/附录中的要求与正文要求合并编号，在出处列标注"附件X"
        5. **混合格式**：当表格仅列标题、段落给出详细要求时，须将两者合并为完整要求条目

        **完整性自检**：M2 表格完成后，回溯招标文件技术要求章节，逐页/逐段核对是否存在遗漏。若发现遗漏，立即补充到表格末尾并标注"（自检补充）"。

    # ── M3：商务要求 ──────────────────────────────
    - id: M3
      title: "M3. 商务要求与合同条款分析"
      prompt: |
        ## M3. 商务要求与合同条款分析

        ### 3.1 资质与业绩要求

        | ID | 条款类型 | 具体要求 | {VENDOR_NAME}准备度 | 原文出处 |
        |----|---------|---------|------------|----------|
        | B1 | | | | |

        **条款类型**：企业资质 / 人员资质 / 业绩要求 / 财务要求

        **{VENDOR_NAME}准备度**（有产品能力说明书时基于说明书中的资质/案例信息判断，无说明书时 AI 模糊评估并标注）：
        - `✅已具备` = 现有资质/业绩满足
        - `⚠️需确认` = 需核实是否满足
        - `❌有缺口` = 明确不满足，需应对策略

        ### 3.2 交付与付款条款

        | 条款 | 要求内容 | 风险评估 | 原文出处 |
        |------|---------|---------|----------|
        | 交付周期 | | | |
        | 验收标准 | | | |
        | 付款比例 | | | |
        | 付款条件 | | | |
        | 质保期限 | | | |

        ### 3.3 合同关键条款深度分析

        重点分析以下合同条款，若招标文件提供合同范本则逐条分析；若未提供则标注"文件未明确"：

        **知识产权归属**
        - 成果物 IP 归属约定（甲方/乙方/共有）
        - 二次开发权利限制
        - 源代码交付要求
        - 风险提示：[难点] 标注

        **违约金条款**
        - 延期交付的违约金比例/上限
        - 质量问题的赔偿机制
        - 单方解除合同条件
        - 风险提示：超出行业惯例的条款须标注 `[扣分]`

        **分包限制**
        - 是否允许分包
        - 分包比例上限
        - 分包商资质要求

    # ── M4：评分细则 ──────────────────────────────
    - id: M4
      title: "M4. 评分细则与得分策略"
      prompt: |
        ## M4. 评分细则与得分策略

        ### 4.1 评分结构概览

        | 评分大类 | 分值/占比 | 原文出处 |
        |---------|---------|----------|
        | 技术分 | | |
        | 商务分 | | |
        | 价格分 | | |
        | 其他 | | |

        > 若招标文件未明确评分比例，填"文件未明确"。

        ### 4.2 逐项评分策略

        对每个评分子项进行分析，格式如下：

        | ID | 评分项 | 分值 | 评分规则 | {VENDOR_NAME}优势 | **如何拿高分（具体策略）** | 原文出处 |
        |----|-------|------|---------|-----------|------------------------|----------|
        | S1 | | | | | | |

        **"如何拿高分"字段要求**：
        - 必须针对本项目，给出具体可执行的撰写建议
        - 例如：哪些产品功能/案例/认证可以对应此评分项
        - 禁止输出"突出优势"等空洞表述

        **{VENDOR_NAME}优势标识**（有产品能力说明书时基于说明书内容判断，无说明书时 AI 模糊评估并标注）：
        - `🔴高` = {VENDOR_NAME}在此项有明显竞争优势
        - `🟡中` = 竞争力一般，需要精心准备
        - `🟢低` = 无明显优势，需补短板

        ### 4.3 价格策略建议

        基于评分方法（最低价/基准价/综合评分）给出价格策略建议：
        - 评分方法说明（出处）
        - 推荐价格区间策略（若文件信息不足则说明"需结合竞品报价研判"）

    # ── M5：废标与风险 ──────────────────────────────
    - id: M5
      title: "M5. 废标条款与风险排序"
      prompt: |
        ## M5. 废标条款与风险排序

        **扫描范围（必须全部覆盖）**：
        - 招标文件正文所有章节（尤其"投标人须知"、"投标文件格式"章节）
        - 技术规范书/技术要求章节中被标记映射表标记为废标/否决性的条款
        - 商务条款/合同范本中的否决性条款
        - 评分标准中的"不得分即废标"类条款
        - 附件/附录中的补充废标条件
        - 资格审查/符合性审查章节（若存在独立章节）

        **提取方法**：使用 global_rules 第5条建立的标记映射表，对全文档中所有被标记的条款进行废标/否决性筛查。

        ### 5.1 废标条款清单（逐条列举）

        | ID | 废标类型 | 废标条款原文 | 出处 | 规避措施 |
        |----|---------|------------|------|---------|
        | W1 | | | | |

        **废标类型**：
        - `资格性废标`：资质不符、业绩不满足
        - `符合性废标`：技术参数负偏离、商务条款不响应
        - `实质性废标`：★号核心功能不满足
        - `时间性废标`：逾期提交、保证金未到账
        - `格式性废标`：盖章不全、密封不合规

        > **重要**：废标条款必须引用原文，不得转述或归纳，每条必须有具体规避措施。

        ### 5.2 TOP5 风险优先级排序

        选出影响投标成败的最重要5个风险，按优先级排序：

        | 优先级 | 风险描述 | 类型 | 原文出处 | 应对策略 | 解决时限建议 |
        |--------|---------|------|---------|---------|------------|
        | 🔴 P1 | | | | | |
        | 🔴 P2 | | | | | |
        | 🟡 P3 | | | | | |
        | 🟡 P4 | | | | | |
        | 🟢 P5 | | | | | |

        **风险类型**：技术能力 / 资质业绩 / 交付能力 / 商务条款 / 格式合规

    # ── M6：格式要求 ──────────────────────────────
    - id: M6
      title: "M6. 标书格式要求 Checklist"
      prompt: |
        ## M6. 标书格式要求 Checklist

        提取招标文件中所有格式要求，生成可直接打勾的 Checklist：

        ### 6.1 文件份数与电子版

        - [ ] 正本：___份（出处：___）
        - [ ] 副本：___份（出处：___）
        - [ ] 电子版要求：___（出处：___）

        ### 6.2 装订与密封

        - [ ] 装订方式：___（出处：___）
        - [ ] 分册要求：___（出处：___）
        - [ ] 密封方式：___（出处：___）
        - [ ] 封皮标注要求：___（出处：___）

        ### 6.3 盖章与签字

        - [ ] 法定代表人签字：___（出处：___）
        - [ ] 公章要求：___（出处：___）
        - [ ] 骑缝章要求：___（出处：___）
        - [ ] 授权代理人要求：___（出处：___）

        ### 6.4 提交要求

        - [ ] 提交截止时间：___（出处：___）
        - [ ] 提交地点：___（出处：___）
        - [ ] 线上投标平台：___（出处：___）

        ### 6.5 容易遗漏的细节（重点提示）

        > 列出本招标文件中不常见或容易漏做的格式要求，标注 `[废标]` 风险等级。

        > 文件未明确的格式项填"文件未明确，参照行业惯例"。

    # ── M7：标书撰写指导（全新核心模块）───────────────
    - id: M7
      title: "M7. 标书撰写指导"
      prompt: |
        ## M7. 标书撰写指导


# 投标文件大纲生成 Prompt
# v2.0.0 | 由 PROMPT.md Phase 2 调用，基于 Phase 1 的 M2 分析结果生成大纲

prompt:
  name: bid_outline_generator
  version: "2.0.0"
  description: |
    基于招标分析报告（M2技术要求 + M4评分细则）生成投标文件大纲。
    输出三部分：大纲说明（Part A）、完整大纲（Part B）、需求-章节对应表（Part C）。

  # ─────────────────────────────────────────────
  # 强制章节结构（按2026版标书格式规范）
  # ─────────────────────────────────────────────
  mandatory_structure: |
    投标文件大纲仅包含技术部分（遵循2026版标书格式规范）：

    [封面] → [目录] → 一、技术部分

  # ─────────────────────────────────────────────
  # 编号体系规范
  # ─────────────────────────────────────────────
  numbering_rules: |
    严格按以下编号体系，最多4级，不得超越：
    - 一级：一、（章级，"一、技术部分"）
    - 二级：1.1、1.2、1.3…（大节，如 "1.1 项目理解与需求分析"）
    - 三级：1.1.1、1.1.2…（小节，如 "1.1.1 项目背景分析"）
    - 四级：1.1.1.1、1.1.1.2…（条目，如 "1.1.1.1 现状痛点分析"）

    注意：章一级用中文数字（一），以下各级用阿拉伯数字。

  # ─────────────────────────────────────────────
  # 技术部分展开逻辑（核心算法）
  # ─────────────────────────────────────────────
  technical_section_logic: |
    "一、技术部分"是大纲的核心，展开规则如下：

    **Step 1**：从 Phase 1 的 M2 分析中提取所有需求分类（包含 AI 动态创建的技术能力类 + 6 个固定服务管理类：交付验收/售后服务/培训要求/技术支持/项目管理/人员要求）

    **Step 2**：为每个【必须】标注的技术要求，在大纲中设立专项章节（二级或三级）
    - 原则：每个★号要求必须有明确对应章节，不得遗漏
    - 一个章节可以覆盖多个同类★号要求

    **Step 3**：为 M4 中分值较高（≥10分）的评分项设立专项章节
    - 高分评分项应有独立二级章节，以便评委快速定位

    **Step 4**：技术部分标准子章节（必须包含，若招标文件无特殊要求）：
    ```
    一、技术部分
      1.1 技术偏离表
      1.2 项目理解与需求分析
        1.2.1 招标方需求理解
        1.2.2 项目建设目标
        1.2.3 现状分析与痛点
      1.3 总体方案设计
        1.3.1 设计原则与理念
        1.3.2 总体架构设计
        1.3.3 核心功能方案（按需求分类展开，见下方）
      1.4 [针对招标文件技术要求的专项响应章节]  ← 动态生成
      1.5 实施方案与计划
        1.5.1 实施路径
        1.5.2 项目里程碑计划
        1.5.3 资源投入计划
      1.6 质量保障方案
      1.7 安全方案
        1.7.1 安全架构设计
        1.7.2 等保合规方案（如有等保要求）
      1.8 国产化适配方案（如有信创要求）
      1.9 项目管理方案（若 M2 "项目管理"分类有【必须】条款则保留，否则可省略）
        1.9.1 项目管理组织与流程
        1.9.2 项目沟通与变更管理
        1.9.3 项目文档交付物清单
      1.10 项目团队与人员配置（对应 M2 "人员要求"分类）
        1.10.1 团队组织架构
        1.10.2 关键岗位人员资质
      1.11 售后服务方案（对应 M2 "售后服务"+"技术支持"分类）
        1.11.1 质保服务方案
        1.11.2 运维服务方案
        1.11.3 技术支持与应急保障（含节日重保/7×24保障/SLA）
        1.11.4 服务响应承诺
        1.11.5 增值服务方案
      1.12 培训方案（对应 M2 "培训要求"分类）
      1.13 交付与验收方案（若 M2 "交付验收"分类有独立要求则保留，否则合并到 1.5）
    ```

    **Step 5**：动态生成 1.4 专项响应章节
    - 对 M2 中每个**技术能力类**需求分类（含 AI 动态创建的新分类），若有【必须】条款，则在 1.4 下创建对应子节
    - 命名格式："1.4.X [技术类别]解决方案"（如"1.4.1 容器编排与集群管理方案"）
    - 若 M2 某类别有多个★号要求，在该子节下进一步展开三级目录

    **Step 5.5**：服务与管理类章节映射
    M2 中服务管理类的要求不在 1.4 下创建，而是映射到对应的标准章节（注意：以下编号为 Step 4 模板中的参考编号，实际编号随动态章节增减自动调整）：
    - "交付验收"分类 → 映射到"实施方案与计划"的对应子节；若有独立验收流程要求，可新增"交付与验收方案"独立章节
    - "售后服务"/"技术支持"分类 → 映射到"售后服务方案"的对应子节，含技术支持/节日重保/7×24保障/SLA
    - "培训要求"分类 → 映射到"培训方案"，有【必须】条款则展开三级目录（如培训计划/师资/考核）
    - "项目管理"分类 → 若有【必须】条款则保留"项目管理方案"独立二级章节
    - "人员要求"分类 → 映射到"项目团队与人员配置"，展开对应子节
    - 若某服务类分类有超过 5 条【必须】条款，应升级为独立二级章节

    **禁止**：禁止创建"凑数"章节（无对应招标需求的章节）

  # ─────────────────────────────────────────────
  # 输出格式要求
  # ─────────────────────────────────────────────
  output_format: |
    输出三个部分，按顺序输出，不得省略任何部分：

    ---

    ## Part A：大纲说明

    简要说明本大纲的结构决策（3-5行）：
    - 技术部分总章节数（二级节点数量）
    - 技术部分展开逻辑（基于哪些★号要求设立了哪些专项章节）
    - 覆盖了哪些关键评分项
    - 特别说明（如有行业扩展章节或服务方案）

    ---

    ## Part B：完整大纲（Word TOC 格式）

    按 Word 目录样式输出，使用以下格式：

    ```
    [封面]
    [目录]（自动生成）

    一、技术部分
      [完整技术章节，按 technical_section_logic 动态生成]
    ```

    > 说明：
    > - 每个章节标题后可加 [对应需求] 注释，便于对照
    > - 信创/等保等专项章节若本项目不涉及则删除
    > - 四级以下不在目录显示

    ---

    ## Part C：需求-章节对应表

    确保 M2 中每个【必须】条款都有对应章节，无遗漏：

    | 招标文件要求 | 来源（M2编号/原文出处） | 对应大纲章节 | 是否★必须条款 |
    |------------|---------------------|------------|-------------|
    | | | | |

    > 要求：
    > 1. M2 中所有【必须】和【必须/废标】条款必须出现在此表中
    > 2. M4 中分值≥10分的评分项也须列入此表
    > 3. "对应大纲章节"填具体章节编号（如 1.3.1）
    > 4. 若某需求在大纲中无对应章节，标注"⚠️ 待补充"并说明原因
    > 5. M2 中服务与管理类（交付验收/售后服务/培训/技术支持/项目管理/人员要求）的【必须】条款也须列入此表
    > 6. 若 M7 交叉验证（7.6）发现补充条目，这些条目也须出现在此表中

  # ─────────────────────────────────────────────
  # 质量约束
  # ─────────────────────────────────────────────
  quality_constraints: |
    1. Part B 大纲必须完整，不得用"..."省略
    2. 技术部分章节数量合理（通常二级节 11-16 个，包含项目管理、售后服务、培训、交付验收等服务管理章节），过少说明分析不充分
    3. Part C 对应表必须完整覆盖所有【必须】条款
    4. 禁止凑数章节（无实际需求支撑的章节）
    5. 编号体系必须严格一致，禁止混用中阿数字

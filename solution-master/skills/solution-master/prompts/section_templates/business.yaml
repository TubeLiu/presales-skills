# 业务方案章节模板

方案类型: 业务方案
适用场景: 业务规划、市场策略、产品方案、运营方案等

典型章节结构:
  - 执行摘要:
      内容要点: [方案概述, 核心价值, 预期成果]
      建议字数: 500-1000
  - 背景分析:
      内容要点: [行业现状, 市场趋势, 竞争格局, SWOT分析]
      建议字数: 2000-3000
  - 需求与痛点:
      内容要点: [客户需求, 当前痛点, 改进机会]
      建议字数: 1500-2500
  - 解决方案:
      内容要点: [方案概述, 核心策略, 实现路径, 差异化优势]
      建议字数: 3000-5000
  - 商业模式:
      内容要点: [价值主张, 收入模式, 成本结构, 合作伙伴]
      建议字数: 2000-3000
  - 实施规划:
      内容要点: [阶段规划, 关键里程碑, 资源需求, 时间表]
      建议字数: 2000-3000
  - 风险与应对:
      内容要点: [风险识别, 影响评估, 应对措施]
      建议字数: 1000-2000
  - 投资回报分析:
      内容要点: [投资预算, ROI分析, 回收周期]
      建议字数: 1000-2000

写作要点:
  - 以客户视角描述价值，而非自身能力
  - 用数据和案例支撑每个关键论点
  - 竞争分析要客观，不贬低竞争对手
  - ROI 数据要有计算依据，不夸大

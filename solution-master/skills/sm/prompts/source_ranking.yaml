# 多源检索结果评分规则

评分维度:
  相关性:
    权重: 0.4
    评分标准:
      10: 完全匹配章节主题，直接可用
      8: 高度相关，稍作调整即可使用
      6: 中度相关，需要提取部分内容
      4: 低度相关，仅供参考
      2: 边缘相关，与主题有间接联系
      0: 不相关

  权威性:
    权重: 0.25
    来源基础分:
      本地KB: 8  # 企业内部文档，可信度高
      CDP_登录态站点: 7  # 需登录访问的站点（企业内部平台、付费知识库等）
      AnythingLLM: 7  # 经过筛选入库的内容
      Web_权威站点: 6  # 官方文档、标准组织
      Web_一般: 4  # 博客、论坛
    调整规则:
      - 企业自有产品相关内容，本地KB +2
      - CDP 来源为企业内部站点时，CDP_登录态站点 +1
      - 行业标准/规范，Web 权威站点 +2
      - 未标明作者/来源的内容，-2

  完整性:
    权重: 0.2
    评分标准:
      10: 完整的解决方案/详细技术文档
      8: 较完整，覆盖主要方面
      6: 部分内容，覆盖关键点
      4: 摘要或概述级别
      2: 片段信息

  时效性:
    权重: 0.15
    评分标准:
      10: 最近 6 个月内
      8: 6-12 个月
      6: 1-2 年
      4: 2-3 年
      2: 3 年以上
    注意: 基础理论/架构文档不受时效性影响，固定给 8 分

去重规则:
  语义相似度阈值: 0.8  # 超过此阈值视为重复
  保留策略: 保留综合得分最高的版本
  标注: 标记已去重的来源供追溯

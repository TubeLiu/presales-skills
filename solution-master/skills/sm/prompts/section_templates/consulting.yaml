# 咨询报告章节模板

方案类型: 咨询报告
适用场景: 行业研究、战略咨询、可行性分析、评估报告等

典型章节结构:
  - 研究概述:
      内容要点: [研究目的, 研究范围, 研究方法, 数据来源]
      建议字数: 1000-1500
  - 行业分析:
      内容要点: [行业概况, 市场规模, 发展趋势, 政策环境, 技术趋势]
      建议字数: 3000-5000
  - 现状评估:
      内容要点: [当前状况, 问题诊断, 差距分析, 标杆对比]
      建议字数: 3000-5000
  - 战略建议:
      内容要点: [战略方向, 实施路径, 优先级排序, 资源配置]
      建议字数: 3000-5000
  - 实施路线图:
      内容要点: [短期行动, 中期目标, 长期愿景, 关键节点]
      建议字数: 2000-3000
  - 风险评估:
      内容要点: [风险识别, 概率与影响矩阵, 缓解策略]
      建议字数: 1500-2500
  - 结论与建议:
      内容要点: [核心发现, 关键建议, 下一步行动]
      建议字数: 1000-1500

写作要点:
  - 以数据驱动，避免主观臆断
  - 所有引用数据标明来源和时效
  - 建议需具体可行，附带优先级
  - 使用框架和模型支撑分析（如波特五力、PEST等）

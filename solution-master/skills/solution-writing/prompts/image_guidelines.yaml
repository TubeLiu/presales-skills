# 方案配图护栏规则

护栏:
  章节上限: 8          # 每章最多 8 张图
  H3上限: 1            # 每个 H3 小节最多 1 张图
  章节内去重: true     # 同一章节内不允许重复图片
  跨章节去重: true     # 全文范围追踪图片去重
  最小文件大小_KB: 5   # 跳过过小的图片

图片描述格式: "图 {章节号}-{序号}：{与H3上下文相关的描述}"
# 示例：图 2.1-1：微服务架构总体设计（支持弹性扩缩容）

图片位置:
  放置规则: 紧跟在相关段落之后
  对齐方式: 居中
  默认宽度: 14cm     # DOCX 输出时的默认宽度

可能需要图片的章节类型:
  - 系统架构设计
  - 组件关系图
  - 部署拓扑图
  - 数据流程图
  - 工作流程图
  - 网络拓扑图
  - 监控架构图
  - 安全框架图

通常不需要图片的章节类型:
  - 纯文字叙述
  - 功能列表描述
  - 资质证书说明
  - 概念性概述（500字以下）

无KB匹配时的兜底策略:
  首选: draw.io 生成
  次选: AI 生成
  兜底: 占位符文本
  占位符格式: "[图片占位符 — {描述}：请手动插入图片]"

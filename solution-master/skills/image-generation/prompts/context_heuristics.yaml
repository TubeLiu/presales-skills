# 上下文感知配图启发式规则
# 根据章节语义自动选择最佳图源

规则列表:
  - 语义特征: [架构设计, 总体架构, 技术架构, 系统架构, 平台架构]
    推荐图源: [drawio, ai, placeholder]
    图表类型: 分层组件图
    AI提示关键词: architecture

  - 语义特征: [部署方案, 部署架构, 部署拓扑, 网络架构, 网络拓扑]
    推荐图源: [drawio, ai, placeholder]
    图表类型: 拓扑图
    AI提示关键词: architecture

  - 语义特征: [数据流, 业务流程, 工作流程, 审批流程, 操作流程]
    推荐图源: [drawio, ai, placeholder]
    图表类型: 流程图
    AI提示关键词: flowchart

  - 语义特征: [监控方案, 运维架构, 告警体系, 日志架构]
    推荐图源: [drawio, ai, placeholder]
    图表类型: 架构图
    AI提示关键词: architecture

  - 语义特征: [安全架构, 安全框架, 安全体系, 等保, 访问控制]
    推荐图源: [drawio, ai, placeholder]
    图表类型: 分层架构图
    AI提示关键词: architecture

  - 语义特征: [产品功能, 系统界面, 操作演示, 功能展示]
    推荐图源: [local, ai, web, placeholder]
    图表类型: 截图/示意图
    AI提示关键词: null  # 优先用本地 KB 截图

  - 语义特征: [组织架构, 团队结构, 人员配置, 项目组织]
    推荐图源: [drawio, ai, placeholder]
    图表类型: 组织图
    AI提示关键词: org_chart

  - 语义特征: [行业趋势, 市场分析, 竞争分析, 数据分析, SWOT]
    推荐图源: [web, ai, placeholder]
    图表类型: 数据图/对比图
    AI提示关键词: null  # 优先用网络数据图

  - 语义特征: [项目计划, 里程碑, 实施计划, 进度安排]
    推荐图源: [drawio, placeholder]
    图表类型: 时间线/甘特图
    AI提示关键词: null

  - 语义特征: [接口设计, API设计, 数据模型, 数据库设计]
    推荐图源: [drawio, placeholder]
    图表类型: ER图/接口关系图
    AI提示关键词: null

默认规则:
  无匹配时: placeholder
  占位符格式: "[图片占位符 — {描述}：请手动插入图片]"

降级策略:
  drawio不可用: 必须警告用户后再跳到下一优先级（不可静默降级）
  AI_API未配置: 警告用户后跳到下一优先级
  本地KB无匹配: 跳到下一优先级
  全部不可用: 使用 placeholder

降级警告格式: "⚠️ {图源} 不可用（{原因}），\"{章节标题}\"的{图表类型}将使用 {降级目标} 生成。建议运行 /solution-config setup 配置。"

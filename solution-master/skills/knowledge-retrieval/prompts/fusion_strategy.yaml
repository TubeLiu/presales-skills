# 多源检索结果融合策略

融合流程:
  1_收集: 从四层检索收集所有原始结果（本地KB、AnythingLLM、Web搜索、CDP浏览器检索）
  2_初筛: 去除明显不相关的结果（相关性 < 4）
  3_评分: 按 source_ranking.yaml 的规则对每条结果评分
  4_去重: 跨源语义去重，保留评分最高版本
  5_排序: 按综合得分降序
  6_缺口分析: 比对章节要点清单，识别未覆盖的知识点
  7_补查: 对知识空白发起定向搜索（最多 2 次 Web 查询）
  8_输出: 生成结构化的检索结果报告

内容类型识别:
  企业自有:
    关键词: [产品名, 公司名, 内部系统名, 项目代号]
    优先来源: [本地KB, CDP, AnythingLLM, Web]
  行业标准:
    关键词: [标准, 规范, 最佳实践, 框架, 合规, 等保]
    优先来源: [Web, AnythingLLM, CDP, 本地KB]
  通用技术:
    关键词: [架构, 设计, 实现, 部署, 运维]
    优先来源: [AnythingLLM, Web, CDP, 本地KB]
  案例经验:
    关键词: [案例, 经验, 实践, 项目, 成功]
    优先来源: [本地KB, CDP, AnythingLLM, Web]

多文档互补:
  策略: 不同文档提供不同维度的内容
  示例:
    - 文档A提供架构设计
    - 文档B提供部署实施
    - 文档C提供运维方案
  要求: 记录每个知识片段的来源文档，避免合并语义重叠的内容

缺口分析:
  触发条件: 章节要点清单中有任何要点未被检索结果覆盖
  补查策略:
    - 提取未覆盖要点的关键词
    - 构造定向 Web 搜索查询
    - 最多补查 2 次
    - 补查结果同样经过评分和去重
  无结果处理: 标记为"知识空白"，提醒撰写者该部分需要依赖自身专业知识
